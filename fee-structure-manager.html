<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fee Structure Manager</title>
<style>
  :root{
    --ink:#1B3A2F;
    --ink-light:#2F5241;
    --gold:#C89B3C;
    --gold-light:#E4C77A;
    --paper:#FAF8F3;
    --paper-dim:#F0ECE1;
    --charcoal:#2B2B28;
    --muted:#7A7669;
    --line:#DED7C4;
    --danger:#A83E3E;
    --danger-bg:#F7E9E9;
    --radius:10px;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --serif: Georgia, "Times New Roman", "Lora", serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:var(--sans);
    background:var(--paper-dim);
    color:var(--charcoal);
  }
  .app{
    max-width:1440px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  /* ---------- HEADER ---------- */
  header.topbar{
    background:var(--ink);
    color:var(--paper);
    padding:18px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .brand-mark{
    width:38px;height:38px;border-radius:50%;
    background:var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--serif);
    font-weight:700;
    color:var(--ink);
    font-size:16px;
    flex-shrink:0;
  }
  .brand-text h1{
    font-size:16px;
    margin:0;
    font-weight:600;
    letter-spacing:.02em;
  }
  .brand-text p{
    margin:2px 0 0;
    font-size:12px;
    color:var(--gold-light);
    letter-spacing:.03em;
  }
  .school-name-input{
    background:transparent;
    border:none;
    border-bottom:1px dashed rgba(250,248,243,.35);
    color:var(--paper);
    font-size:12px;
    padding:2px 0;
    font-family:var(--sans);
    width:220px;
  }
  .school-name-input:focus{outline:none;border-bottom-color:var(--gold);}

  .level-tabs{
    display:flex;
    gap:6px;
    background:rgba(0,0,0,.18);
    padding:4px;
    border-radius:999px;
  }
  .level-tab{
    border:none;
    background:transparent;
    color:var(--paper);
    opacity:.65;
    padding:8px 16px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    letter-spacing:.02em;
  }
  .level-tab.active{
    background:var(--gold);
    color:var(--ink);
    opacity:1;
  }

  .view-toggle{
    display:none;
    gap:6px;
  }

  /* ---------- MAIN LAYOUT ---------- */
  .workspace{
    flex:1;
    display:grid;
    grid-template-columns:220px 1fr 380px;
    gap:0;
    align-items:start;
  }
  @media (max-width: 980px){
    .workspace{grid-template-columns:1fr;}
    .grade-rail, .preview-col{display:none;}
    .grade-rail.show-mobile, .editor-col.show-mobile, .preview-col.show-mobile{display:block;}
    .view-toggle{display:flex;}
  }

  /* ---- grade rail ---- */
  .grade-rail{
    background:var(--paper);
    border-right:1px solid var(--line);
    padding:20px 14px;
    min-height:calc(100vh - 74px);
  }
  .grade-rail h3{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--muted);
    margin:0 0 10px 4px;
  }
  .grade-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:9px 10px;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:4px;
    font-size:14px;
    color:var(--charcoal);
  }
  .grade-item:hover{background:var(--paper-dim);}
  .grade-item.active{
    background:var(--ink);
    color:var(--paper);
    font-weight:600;
  }
  .grade-item .count{
    font-size:11px;
    opacity:.65;
  }
  .grade-item input.rename{
    background:transparent;
    border:none;
    color:inherit;
    font-size:14px;
    font-family:var(--sans);
    width:100%;
  }
  .grade-item input.rename:focus{outline:none;}
  .grade-del{
    background:none;border:none;color:inherit;opacity:.5;cursor:pointer;font-size:14px;padding:0 2px;
  }
  .grade-del:hover{opacity:1;color:var(--danger);}
  .add-grade-btn{
    width:100%;
    margin-top:8px;
    padding:9px;
    border:1.5px dashed var(--line);
    background:none;
    border-radius:8px;
    color:var(--ink-light);
    font-size:13px;
    font-weight:600;
    cursor:pointer;
  }
  .add-grade-btn:hover{border-color:var(--gold);color:var(--ink);}

  /* ---- editor col ---- */
  .editor-col{
    padding:24px 28px;
    min-height:calc(100vh - 74px);
    border-right:1px solid var(--line);
  }
  .editor-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:4px;
    flex-wrap:wrap;
    gap:8px;
  }
  .editor-head h2{
    margin:0;
    font-size:22px;
    font-family:var(--serif);
    color:var(--ink);
  }
  .editor-sub{
    font-size:12.5px;
    color:var(--muted);
    margin-bottom:18px;
  }

  .term-row{
    display:flex;
    gap:6px;
    margin-bottom:18px;
  }
  .term-chip{
    border:1px solid var(--line);
    background:var(--paper);
    padding:6px 14px;
    border-radius:999px;
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
    color:var(--muted);
  }
  .term-chip.active{
    background:var(--ink);
    border-color:var(--ink);
    color:var(--paper);
  }

  table.fee-table{
    width:100%;
    border-collapse:collapse;
    background:var(--paper);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:0 1px 2px rgba(0,0,0,.04);
  }
  .fee-table thead th{
    text-align:left;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--muted);
    padding:10px 12px;
    border-bottom:1px solid var(--line);
    background:var(--paper-dim);
  }
  .fee-table tbody td{
    padding:8px 10px;
    border-bottom:1px solid var(--line);
    vertical-align:middle;
  }
  .fee-table tbody tr:last-child td{border-bottom:none;}
  .fee-table input[type=text]{
    width:100%;
    border:1px solid transparent;
    background:transparent;
    padding:6px 7px;
    font-size:13.5px;
    border-radius:6px;
    font-family:var(--sans);
  }
  .fee-table input[type=number]{
    width:100%;
    border:1px solid transparent;
    background:transparent;
    padding:6px 7px;
    font-size:13.5px;
    border-radius:6px;
    text-align:right;
    font-family:var(--sans);
  }
  .fee-table input:hover{border-color:var(--line);}
  .fee-table input:focus{outline:none;border-color:var(--gold);background:#fff;}
  select.cat-select{
    border:1px solid transparent;
    background:transparent;
    font-size:12.5px;
    padding:5px 6px;
    border-radius:6px;
    font-family:var(--sans);
    color:var(--charcoal);
  }
  select.cat-select:hover{border-color:var(--line);}
  .boarder-toggle{
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .boarder-toggle input{transform:scale(1.05);}
  .del-row-btn{
    background:none;
    border:none;
    color:var(--muted);
    cursor:pointer;
    font-size:15px;
    padding:4px 6px;
    border-radius:6px;
  }
  .del-row-btn:hover{color:var(--danger);background:var(--danger-bg);}

  .add-fee-btn{
    margin-top:12px;
    padding:9px 16px;
    border:1.5px dashed var(--line);
    background:none;
    border-radius:8px;
    color:var(--ink-light);
    font-size:13px;
    font-weight:600;
    cursor:pointer;
  }
  .add-fee-btn:hover{border-color:var(--gold);color:var(--ink);}

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--muted);
    font-size:13.5px;
  }

  .totals-strip{
    display:flex;
    gap:10px;
    margin-top:18px;
    flex-wrap:wrap;
  }
  .total-card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px 16px;
    flex:1;
    min-width:150px;
  }
  .total-card .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
  .total-card .val{font-size:19px;font-weight:700;color:var(--ink);font-family:var(--serif);margin-top:2px;}

  /* ---- preview col ---- */
  .preview-col{
    background:var(--paper-dim);
    padding:24px;
    position:sticky;
    top:0;
    min-height:calc(100vh - 74px);
  }
  .preview-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--muted);
    margin-bottom:10px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .preview-label .dot{
    width:6px;height:6px;border-radius:50%;background:var(--gold);
    box-shadow:0 0 0 3px rgba(200,155,60,.2);
  }

  .doc{
    background:#fffdf8;
    border:1px solid var(--line);
    border-radius:4px;
    box-shadow:0 6px 24px rgba(27,58,47,.10);
    font-family:var(--serif);
    color:#1e1e1a;
    position:relative;
    overflow:hidden;
  }
  .doc-watermark{
    position:absolute;
    top:44%;left:50%;
    transform:translate(-50%,-50%) rotate(-18deg);
    font-family:var(--sans);
    font-size:13px;
    letter-spacing:.3em;
    color:rgba(27,58,47,.07);
    font-weight:800;
    pointer-events:none;
    white-space:nowrap;
  }
  .doc-head{
    text-align:center;
    padding:24px 24px 14px;
    border-bottom:3px double var(--ink);
  }
  .doc-head .seal{
    width:44px;height:44px;
    margin:0 auto 8px;
    border-radius:50%;
    border:2px solid var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-size:17px;
    color:var(--gold);
  }
  .doc-head h2{
    margin:0;
    font-size:19px;
    letter-spacing:.02em;
    color:var(--ink);
  }
  .doc-head .doc-sub{
    font-size:11.5px;
    color:#6b6b5f;
    margin-top:4px;
    letter-spacing:.03em;
  }
  .doc-head .doc-title{
    margin-top:12px;
    font-size:13.5px;
    font-weight:700;
    color:var(--charcoal);
    text-transform:uppercase;
    letter-spacing:.06em;
  }

  .doc-toggles{
    display:flex;
    justify-content:center;
    gap:8px;
    padding:12px 24px 0;
    font-family:var(--sans);
  }
  .doc-toggle-btn{
    border:1px solid var(--line);
    background:#fff;
    padding:5px 13px;
    border-radius:999px;
    font-size:11.5px;
    font-weight:600;
    cursor:pointer;
    color:var(--muted);
  }
  .doc-toggle-btn.active{
    background:var(--ink);
    border-color:var(--ink);
    color:#fff;
  }

  .doc-body{padding:16px 24px 8px;}
  .doc-cat{
    margin-bottom:6px;
  }
  .doc-cat-name{
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:.09em;
    color:#8a8672;
    font-family:var(--sans);
    margin:14px 0 4px;
  }
  .doc-line{
    display:flex;
    justify-content:space-between;
    padding:4px 0;
    font-size:13.5px;
    border-bottom:1px dotted #ddd7c4;
  }
  .doc-line .amt{font-weight:600;}
  .doc-total{
    display:flex;
    justify-content:space-between;
    padding:14px 0 4px;
    margin-top:8px;
    border-top:2px solid var(--ink);
    font-size:15px;
    font-weight:700;
    color:var(--ink);
  }
  .doc-footer{
    font-family:var(--sans);
    font-size:11px;
    color:#7c7862;
    padding:14px 24px 22px;
    border-top:1px solid var(--line);
    margin-top:12px;
    line-height:1.6;
  }
  .doc-footer strong{color:var(--charcoal);}
  .doc-empty{
    padding:50px 24px;
    text-align:center;
    color:#9a9686;
    font-family:var(--sans);
    font-size:13px;
  }

  .preview-note{
    font-family:var(--sans);
    font-size:11.5px;
    color:var(--muted);
    margin-top:12px;
    line-height:1.5;
    padding:10px 12px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:8px;
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">FS</div>
      <div class="brand-text">
        <h1>Fee Structure Manager</h1>
        <input id="schoolNameInput" class="school-name-input" value="Riverbend Academy" placeholder="School name">
      </div>
    </div>
    <div class="level-tabs" id="levelTabs"></div>
    <div class="view-toggle" id="viewToggle">
      <button class="doc-toggle-btn" id="btnShowEditor">Editor</button>
      <button class="doc-toggle-btn" id="btnShowPreview">Preview</button>
    </div>
  </header>

  <div class="workspace">
    <nav class="grade-rail" id="gradeRail"></nav>
    <main class="editor-col" id="editorCol"></main>
    <aside class="preview-col" id="previewCol"></aside>
  </div>
</div>

<script>
/* ===================== STATE ===================== */
const CATEGORIES = ["Tuition","Boarding","Lunch / Meals","Transport","Activity & Co-curricular","Development Levy","Examination","Uniform & Games Kit","Other"];
const TERMS = ["Term 1","Term 2","Term 3"];

let state = {
  schoolName: "Riverbend Academy",
  activeLevel: 0,
  activeGrade: {}, // levelIndex -> gradeIndex
  activeTerm: 0,
  mobileView: "editor",
  levels: [
    {
      name: "Primary",
      grades: [
        mkGrade("Grade 4"), mkGrade("Grade 5"), mkGrade("Grade 6")
      ]
    },
    {
      name: "Junior School",
      grades: [
        mkGrade("Grade 7"), mkGrade("Grade 8"), mkGrade("Grade 9")
      ]
    },
    {
      name: "Secondary",
      grades: [
        mkGrade("Form 1"), mkGrade("Form 2"), mkGrade("Form 3"), mkGrade("Form 4")
      ]
    }
  ]
};

function mkGrade(name){
  return {
    name,
    fees: [
      { name: "Tuition Fee", category: "Tuition", boarderOnly:false, amounts:[15000,15000,12000] },
      { name: "Boarding Fee", category: "Boarding", boarderOnly:true, amounts:[9000,9000,8000] },
      { name: "Lunch Programme", category: "Lunch / Meals", boarderOnly:false, amounts:[2500,2500,2500] },
      { name: "Activity Fee", category: "Activity & Co-curricular", boarderOnly:false, amounts:[1000,1000,800] }
    ]
  };
}
function uid(){ return Math.random().toString(36).slice(2,9); }

/* ===================== RENDER ===================== */
function render(){
  renderLevelTabs();
  renderGradeRail();
  renderEditor();
  renderPreview();
  applyMobileView();
  document.getElementById('schoolNameInput').value = state.schoolName;
}

function renderLevelTabs(){
  const el = document.getElementById('levelTabs');
  el.innerHTML = "";
  state.levels.forEach((lvl,i)=>{
    const b = document.createElement('button');
    b.className = 'level-tab' + (i===state.activeLevel ? ' active':'');
    b.textContent = lvl.name;
    b.onclick = ()=>{ state.activeLevel = i; render(); };
    el.appendChild(b);
  });
}

function currentGradeIndex(){
  const lvl = state.activeLevel;
  if(state.activeGrade[lvl] === undefined) state.activeGrade[lvl] = 0;
  return state.activeGrade[lvl];
}
function currentLevel(){ return state.levels[state.activeLevel]; }
function currentGrade(){
  const lvl = currentLevel();
  const gi = currentGradeIndex();
  return lvl.grades[gi];
}

function renderGradeRail(){
  const el = document.getElementById('gradeRail');
  const lvl = currentLevel();
  const gi = currentGradeIndex();
  el.innerHTML = "";

  const h = document.createElement('h3');
  h.textContent = lvl.name + " levels";
  el.appendChild(h);

  lvl.grades.forEach((g, idx)=>{
    const item = document.createElement('div');
    item.className = 'grade-item' + (idx===gi ? ' active':'');
    item.onclick = (e)=>{
      if(e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
      state.activeGrade[state.activeLevel] = idx;
      render();
    };

    const input = document.createElement('input');
    input.className = 'rename';
    input.value = g.name;
    input.onclick = (e)=> e.stopPropagation();
    input.oninput = (e)=>{ g.name = e.target.value; renderPreview(); };
    input.onblur = ()=> renderGradeRail();

    const right = document.createElement('div');
    right.style.display='flex';
    right.style.alignItems='center';
    right.style.gap='4px';

    const count = document.createElement('span');
    count.className = 'count';
    count.textContent = g.fees.length;

    const del = document.createElement('button');
    del.className = 'grade-del';
    del.textContent = '✕';
    del.title = 'Delete this level';
    del.onclick = (e)=>{
      e.stopPropagation();
      if(lvl.grades.length===1){ alert("At least one grade/form must remain."); return; }
      if(confirm(`Remove "${g.name}" and all its fees?`)){
        lvl.grades.splice(idx,1);
        if(state.activeGrade[state.activeLevel] >= lvl.grades.length){
          state.activeGrade[state.activeLevel] = lvl.grades.length-1;
        }
        render();
      }
    };

    right.appendChild(count);
    right.appendChild(del);
    item.appendChild(input);
    item.appendChild(right);
    el.appendChild(item);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-grade-btn';
  addBtn.textContent = '+ Add grade / form';
  addBtn.onclick = ()=>{
    const name = prompt("Name for the new grade/form (e.g. Grade 3, Form 2, PP1):");
    if(name && name.trim()){
      lvl.grades.push(mkGrade(name.trim()));
      state.activeGrade[state.activeLevel] = lvl.grades.length-1;
      render();
    }
  };
  el.appendChild(addBtn);
}

function money(n){
  n = Number(n)||0;
  return "KES " + n.toLocaleString('en-KE');
}

function renderEditor(){
  const el = document.getElementById('editorCol');
  const grade = currentGrade();
  el.innerHTML = "";

  const head = document.createElement('div');
  head.className = 'editor-head';
  head.innerHTML = `<h2>${escapeHtml(grade.name)} — Fee Items</h2>`;
  el.appendChild(head);

  const sub = document.createElement('div');
  sub.className = 'editor-sub';
  sub.textContent = `${currentLevel().name} · edit names, amounts and categories below — the preview updates as you type`;
  el.appendChild(sub);

  // term chips
  const termRow = document.createElement('div');
  termRow.className = 'term-row';
  TERMS.forEach((t,i)=>{
    const chip = document.createElement('button');
    chip.className = 'term-chip' + (i===state.activeTerm ? ' active':'');
    chip.textContent = t;
    chip.onclick = ()=>{ state.activeTerm = i; render(); };
    termRow.appendChild(chip);
  });
  el.appendChild(termRow);

  if(grade.fees.length===0){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = "No fee items yet for this grade. Add one below to get started.";
    el.appendChild(empty);
  } else {
    const table = document.createElement('table');
    table.className = 'fee-table';
    table.innerHTML = `<thead><tr>
      <th style="width:26%">Fee item</th>
      <th style="width:22%">Category</th>
      <th style="width:16%">Amount (${TERMS[state.activeTerm]})</th>
      <th style="width:14%">Boarders only</th>
      <th style="width:8%"></th>
    </tr></thead>`;
    const tbody = document.createElement('tbody');

    grade.fees.forEach((fee, idx)=>{
      const tr = document.createElement('tr');

      // name
      const tdName = document.createElement('td');
      const nameInput = document.createElement('input');
      nameInput.type='text';
      nameInput.value = fee.name;
      nameInput.oninput = e=>{ fee.name = e.target.value; renderPreview(); };
      tdName.appendChild(nameInput);

      // category
      const tdCat = document.createElement('td');
      const sel = document.createElement('select');
      sel.className = 'cat-select';
      CATEGORIES.forEach(c=>{
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        if(c===fee.category) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.onchange = e=>{ fee.category = e.target.value; renderPreview(); };
      tdCat.appendChild(sel);

      // amount for active term
      const tdAmt = document.createElement('td');
      const amtInput = document.createElement('input');
      amtInput.type='number';
      amtInput.min='0';
      amtInput.step='50';
      amtInput.value = fee.amounts[state.activeTerm];
      amtInput.oninput = e=>{
        fee.amounts[state.activeTerm] = e.target.value === '' ? 0 : Number(e.target.value);
        renderPreview();
        renderTotals();
      };
      tdAmt.appendChild(amtInput);

      // boarder toggle
      const tdBoard = document.createElement('td');
      tdBoard.className = 'boarder-toggle';
      const cb = document.createElement('input');
      cb.type='checkbox';
      cb.checked = fee.boarderOnly;
      cb.onchange = e=>{ fee.boarderOnly = e.target.checked; renderPreview(); };
      tdBoard.appendChild(cb);

      // delete
      const tdDel = document.createElement('td');
      const delBtn = document.createElement('button');
      delBtn.className='del-row-btn';
      delBtn.textContent='🗑';
      delBtn.title='Delete this fee item';
      delBtn.onclick = ()=>{
        grade.fees.splice(idx,1);
        render();
      };
      tdDel.appendChild(delBtn);

      tr.appendChild(tdName);
      tr.appendChild(tdCat);
      tr.appendChild(tdAmt);
      tr.appendChild(tdBoard);
      tr.appendChild(tdDel);
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    el.appendChild(table);
  }

  const addFeeBtn = document.createElement('button');
  addFeeBtn.className = 'add-fee-btn';
  addFeeBtn.textContent = '+ Add fee item';
  addFeeBtn.onclick = ()=>{
    grade.fees.push({ name:"New fee item", category:"Other", boarderOnly:false, amounts:[0,0,0] });
    render();
  };
  el.appendChild(addFeeBtn);

  const totalsDiv = document.createElement('div');
  totalsDiv.className = 'totals-strip';
  totalsDiv.id = 'totalsStrip';
  el.appendChild(totalsDiv);
  renderTotals();
}

function renderTotals(){
  const el = document.getElementById('totalsStrip');
  if(!el) return;
  const grade = currentGrade();
  const t = state.activeTerm;
  const dayTotal = grade.fees.filter(f=>!f.boarderOnly).reduce((s,f)=>s+Number(f.amounts[t]||0),0);
  const boardTotal = grade.fees.reduce((s,f)=>s+Number(f.amounts[t]||0),0);
  el.innerHTML = `
    <div class="total-card"><div class="lbl">Day scholar total · ${TERMS[t]}</div><div class="val">${money(dayTotal)}</div></div>
    <div class="total-card"><div class="lbl">Boarder total · ${TERMS[t]}</div><div class="val">${money(boardTotal)}</div></div>
  `;
}

function renderPreview(){
  const el = document.getElementById('previewCol');
  const grade = currentGrade();
  const t = state.activeTerm;

  el.innerHTML = `
    <div class="preview-label"><span class="dot"></span> Live preview — what parents will see</div>
    <div class="doc" id="docCard"></div>
    <div class="preview-note">This is exactly how the fee statement will render for <strong>${escapeHtml(grade.name)}</strong>. Fix typos or wrong amounts on the left and watch it update here before you publish.</div>
  `;

  const doc = document.getElementById('docCard');

  if(grade.fees.length===0){
    doc.innerHTML = `<div class="doc-empty">Nothing to preview yet — add a fee item to see the statement take shape.</div>`;
    return;
  }

  const boarderMode = doc.dataset.mode || 'day';

  doc.innerHTML = `
    <div class="doc-watermark">PREVIEW · NOT YET PUBLISHED</div>
    <div class="doc-head">
      <div class="seal">🎓</div>
      <h2>${escapeHtml(state.schoolName || "Your School")}</h2>
      <div class="doc-sub">${escapeHtml(currentLevel().name)} · ${escapeHtml(grade.name)}</div>
      <div class="doc-title">${TERMS[t]} Fee Structure</div>
    </div>
    <div class="doc-toggles">
      <button class="doc-toggle-btn" data-mode="day">Day Scholar</button>
      <button class="doc-toggle-btn" data-mode="board">Boarder</button>
    </div>
    <div class="doc-body" id="docBody"></div>
    <div class="doc-footer">
      Payment via <strong>M-Pesa Paybill</strong> — Business No. <strong>XXXXXX</strong>, Account: <strong>${escapeHtml(grade.name)} + Learner Name</strong>.<br>
      Fees are due on or before opening day. For queries, contact the school bursar's office.
    </div>
  `;

  const toggles = doc.querySelectorAll('.doc-toggle-btn');
  const mode = doc.dataset.mode || 'day';
  toggles.forEach(b=>{
    if(b.dataset.mode===mode) b.classList.add('active');
    b.onclick = ()=>{ doc.dataset.mode = b.dataset.mode; renderPreview(); };
  });

  const body = document.getElementById('docBody');
  const relevant = grade.fees.filter(f => mode==='board' ? true : !f.boarderOnly);

  // group by category, preserve category order from CATEGORIES
  let html = "";
  let total = 0;
  CATEGORIES.forEach(cat=>{
    const items = relevant.filter(f=>f.category===cat);
    if(items.length===0) return;
    html += `<div class="doc-cat"><div class="doc-cat-name">${escapeHtml(cat)}</div>`;
    items.forEach(f=>{
      const amt = Number(f.amounts[t]||0);
      total += amt;
      html += `<div class="doc-line"><span>${escapeHtml(f.name)}${f.boarderOnly?' <span style="opacity:.55;font-family:var(--sans);font-size:10.5px;">(boarders)</span>':''}</span><span class="amt">${money(amt)}</span></div>`;
    });
    html += `</div>`;
  });
  html += `<div class="doc-total"><span>Total payable — ${TERMS[t]}</span><span>${money(total)}</span></div>`;
  body.innerHTML = html;
}

function applyMobileView(){
  const editorCol = document.getElementById('editorCol');
  const previewCol = document.getElementById('previewCol');
  const gradeRail = document.getElementById('gradeRail');
  if(window.innerWidth > 980){
    editorCol.classList.remove('show-mobile');
    previewCol.classList.remove('show-mobile');
    gradeRail.classList.remove('show-mobile');
    return;
  }
  [editorCol, previewCol, gradeRail].forEach(e=>e.classList.remove('show-mobile'));
  if(state.mobileView === 'editor'){
    editorCol.classList.add('show-mobile');
    gradeRail.classList.add('show-mobile');
  } else {
    previewCol.classList.add('show-mobile');
  }
  document.getElementById('btnShowEditor').classList.toggle('active', state.mobileView==='editor');
  document.getElementById('btnShowPreview').classList.toggle('active', state.mobileView==='preview');
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

document.getElementById('schoolNameInput').addEventListener('input', e=>{
  state.schoolName = e.target.value;
  renderPreview();
});
document.getElementById('btnShowEditor').addEventListener('click', ()=>{ state.mobileView='editor'; applyMobileView(); });
document.getElementById('btnShowPreview').addEventListener('click', ()=>{ state.mobileView='preview'; applyMobileView(); });
window.addEventListener('resize', applyMobileView);

render();
</script>
