<script id="feeflow-core-inline">
(function() {
  if (window.__feeflowBridgeLoaded) return;
  window.__feeflowBridgeLoaded = true;

  window.__memoryStorage = window.__memoryStorage || {};
  
  const isLocalStorageAvailable = (function() {
    try {
      const testKey = '__ff_test_storage__';
      window.localStorage.setItem(testKey, '1');
      window.localStorage.removeItem(testKey);
      return true;
    } catch(e) {
      return false;
    }
  })();

  window.safeStorage = {
    getItem: function(key) {
      if (isLocalStorageAvailable) {
        try {
          const val = window.localStorage.getItem(key);
          if (val !== null) return val;
        } catch(e) {}
      }
      return window.__memoryStorage[key] !== undefined ? window.__memoryStorage[key] : null;
    },
    setItem: function(key, val) {
      const strVal = String(val);
      if (isLocalStorageAvailable) {
        try { window.localStorage.setItem(key, strVal); } catch(e) {}
      }
      window.__memoryStorage[key] = strVal;
    },
    removeItem: function(key) {
      if (isLocalStorageAvailable) {
        try { window.localStorage.removeItem(key); } catch(e) {}
      }
      delete window.__memoryStorage[key];
    }
  };

  try {
    window.localStorage.getItem = function(key) { return window.safeStorage.getItem(key); };
    window.localStorage.setItem = function(key, val) { return window.safeStorage.setItem(key, val); };
    window.localStorage.removeItem = function(key) { return window.safeStorage.removeItem(key); };
  } catch(e) {}

  function seedDemoDataIfEmpty() {

      const now = Date.now();
      const demoSchools = [
        { id: 'sch_1', name: "St. Mary's Academy - Nairobi", paybill: "522522", plan: "Premium", collectionRate: 88, status: "active", adminUsername: "admin", adminPassword: "admin123", address: "Westlands, Nairobi, Kenya", phone: "0722123456", code: "SMA-001", messagingEndpoint: "https://api.feeflow.co.ke/v1/sms", smsSender: "STMARYS" },
        { id: 'sch_2', name: "Greenwood International School", paybill: "880112", plan: "Premium", collectionRate: 94, status: "active", adminUsername: "greenwood", adminPassword: "gw2026", address: "Karen, Nairobi, Kenya", phone: "0733456789", code: "GIS-002", messagingEndpoint: "https://api.feeflow.co.ke/v1/sms", smsSender: "GREENWOOD" },
        { id: 'sch_3', name: "Mombasa Heritage High", paybill: "400300", plan: "Standard", collectionRate: 76, status: "active", adminUsername: "mombasa", adminPassword: "mhb123", address: "Nyali, Mombasa, Kenya", phone: "0711987654", code: "MHH-003", messagingEndpoint: "", smsSender: "MOMBASAH" }
      ];
      const demoParents = [
        { id: 'par_1', name: "Grace Mwangi", phone: "0712345678", schoolId: 'sch_1', schoolName: "St. Mary's Academy - Nairobi", email: "grace.mwangi@gmail.com", createdAt: now - 864000000 },
        { id: 'par_2', name: "John Kamau", phone: "0723456789", schoolId: 'sch_1', schoolName: "St. Mary's Academy - Nairobi", email: "jkamau@yahoo.com", createdAt: now - 432000000 },
        { id: 'par_3', name: "Dr. Achieng Omondi", phone: "0734567890", schoolId: 'sch_2', schoolName: "Greenwood International School", email: "achieng@omondi.co.ke", createdAt: now - 259200000 }
      ];
      const demoStudents = [
        { id: 'stu_1', name: "David Mwangi", parentId: 'par_1', schoolId: 'sch_1', class: "Grade 4", level: "Primary", adm: "ADM-2024-101", boarding: false, total: 45000, paid: 25000, balance: 20000, status: "partial" },
        { id: 'stu_2', name: "Joy Mwangi", parentId: 'par_1', schoolId: 'sch_1', class: "Grade 8", level: "Primary", adm: "ADM-2022-044", boarding: true, total: 68000, paid: 68000, balance: 0, status: "paid" },
        { id: 'stu_3', name: "Samuel Kamau", parentId: 'par_2', schoolId: 'sch_1', class: "Form 2", level: "Secondary", adm: "ADM-2023-089", boarding: false, total: 52000, paid: 12000, balance: 40000, status: "partial" },
        { id: 'stu_4', name: "Zara Omondi", parentId: 'par_3', schoolId: 'sch_2', class: "Grade 7", level: "Junior School", adm: "ADM-2024-502", boarding: true, total: 85000, paid: 85000, balance: 0, status: "paid" }
      ];
      const demoPayments = [
        { id: 'pay_101', studentId: 'stu_1', studentName: "David Mwangi", amount: 25000, method: "M-Pesa", ref: "QXL9821KK", date: "2026-07-10", schoolId: 'sch_1', status: 'reconciled' },
        { id: 'pay_102', studentId: 'stu_2', studentName: "Joy Mwangi", amount: 68000, method: "Bank Transfer", ref: "BNK-882103", date: "2026-07-05", schoolId: 'sch_1', status: 'reconciled' },
        { id: 'pay_103', studentId: 'stu_3', studentName: "Samuel Kamau", amount: 12000, method: "M-Pesa", ref: "QXM4410ZZ", date: "2026-07-12", schoolId: 'sch_1', status: 'reconciled' },
        { id: 'pay_104', studentId: 'stu_4', studentName: "Zara Omondi", amount: 85000, method: "Cheque", ref: "CHQ-009182", date: "2026-07-02", schoolId: 'sch_2', status: 'reconciled' }
      ];
      const demoReceipts = demoPayments.map(function(p){
        return { id: 'rcpt_' + p.id, paymentId: p.id, studentId: p.studentId, studentName: p.studentName, amount: p.amount, method: p.method, ref: p.ref, date: p.date, schoolId: p.schoolId };
      });
      const demoNotifs = [
        { id: now - 1000, schoolId: 'sch_1', audience: 'parent', parentId: 'par_1', type: 'fee-report', title: "Term 2 Fee Structure Published", body: "St. Mary's Academy published the Term 2 fee structure. Tuition fee balance is KES 20,000 for David Mwangi.", time: "2 hours ago", unread: true },
        { id: now - 2000, schoolId: 'sch_1', audience: 'parent', parentId: 'par_1', type: 'payment', title: "Payment Received", body: "We received KES 25,000 for David Mwangi via M-Pesa Ref QXL9821KK.", time: "4 days ago", unread: false },

        { id: now - 4000, audience: 'super', type: 'platform', title: "New School Onboarded", body: "St. Mary's Academy - Nairobi connected their M-Pesa Paybill successfully.", time: "3 days ago", unread: true }
      ];
      const demoPubSch1 = {
        schoolId: 'sch_1', schoolName: "St. Mary's Academy - Nairobi", paybill: "522522", publishedAt: now - 86400000, publishedBy: "School Admin",
        levels: [
          { name: "Primary", grades: [
            { name: "Grade 4", fees: [ { id: 'f1', name: "Tuition Fee", boarderOnly: false, amounts: [15000, 15000, 15000] }, { id: 'f2', name: "Lunch & Snacks", boarderOnly: false, amounts: [5000, 5000, 5000] } ] },
            { name: "Grade 8", fees: [ { id: 'f3', name: "Tuition Fee", boarderOnly: false, amounts: [18000, 18000, 18000] }, { id: 'f4', name: "Boarding & Meal Plan", boarderOnly: true, amounts: [12000, 12000, 12000] } ] }
          ]},
          { name: "Junior School", grades: [ { name: "Grade 7", fees: [ { id: 'f5', name: "Tuition & Lab Fee", boarderOnly: false, amounts: [20000, 20000, 20000] } ] } ] },
          { name: "Secondary", grades: [ { name: "Form 2", fees: [ { id: 'f6', name: "Secondary Tuition", boarderOnly: false, amounts: [22000, 22000, 22000] } ] } ] }
        ]
      };

      window.safeStorage.setItem('ff_schools', JSON.stringify(demoSchools));
      window.safeStorage.setItem('ff_parents', JSON.stringify(demoParents));
      window.safeStorage.setItem('ff_students', JSON.stringify(demoStudents));
      window.safeStorage.setItem('ff_payments', JSON.stringify(demoPayments));
      window.safeStorage.setItem('ff_receipts', JSON.stringify(demoReceipts));
      window.safeStorage.setItem('ff_notifications', JSON.stringify(demoNotifs));
      window.safeStorage.setItem('ff_fee_published_sch_1', JSON.stringify(demoPubSch1));
      window.safeStorage.setItem('ff_fee_manager_sch_1', JSON.stringify(demoPubSch1));
    }
  }

  seedDemoDataIfEmpty();

  window.ensureDemoSession = function(role) {
    let sessions = [];
    try { sessions = JSON.parse(window.safeStorage.getItem('ff_sessions') || '[]'); } catch(e){}
    if (!Array.isArray(sessions)) sessions = [];

    const existing = sessions.find(function(s) {
      if (role === 'super') return s.type === 'super';
      if (role === 'admin') return s.type === 'admin';
      if (role === 'parent') return s.type === 'parent';
      return false;
    });

    if (existing) return existing;

    if (role === 'super') {
      const superSess = { id: 'sess_' + Date.now(), type: 'super', schoolId: null, name: 'Super Admin', timestamp: Date.now() };
      window.safeStorage.setItem('ff_sessions', JSON.stringify([superSess]));
      return superSess;
    }
    if (role === 'admin') {
      let schs = JSON.parse(window.safeStorage.getItem('ff_schools') || '[]');
      const sch = schs[0] || { id: 'sch_1', name: "St. Mary's Academy - Nairobi" };
      const adminSess = { id: 'sess_' + Date.now(), type: 'admin', schoolId: sch.id, name: sch.name, timestamp: Date.now() };
      window.safeStorage.setItem('ff_sessions', JSON.stringify([adminSess]));
      return adminSess;
    }
    if (role === 'parent') {
      let pars = JSON.parse(window.safeStorage.getItem('ff_parents') || '[]');
      const par = pars[0] || { id: 'par_1', name: "Grace Mwangi", schoolId: 'sch_1', phone: "0712345678" };
      const parentSess = { id: 'sess_' + Date.now(), type: 'parent', parentId: par.id, schoolId: par.schoolId, name: par.name, timestamp: Date.now() };
      window.safeStorage.setItem('ff_sessions', JSON.stringify([parentSess]));
      return parentSess;
    }
    return null;
  };

})();
</script>
    

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeeFlow — Parent Portal</title>
  <style>
    :root {
      --navy: #0c2d57;
      --blue: #1768b2;
      --green: #059669;
      --mint: #10b981;
      --page: #f1f5f9;
      --white: #ffffff;
      --line: #e2e8f0;
      --text: #172033;
      --muted: #64748b;
      --danger: #dc2626;
      --warning: #d97706;
      --sidebar-width: 305px;
      --topbar-height: 78px;
      --radius: 16px;
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: var(--page);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
    }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      width: var(--sidebar-width);
      background: var(--white);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      z-index: 30;
    }

    .brand {
      min-height: 122px;
      padding: 28px 24px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      gap: 13px;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      color: white;
      background: linear-gradient(135deg, var(--navy), var(--green));
      display: grid;
      place-items: center;
      font-size: 24px;
      flex: 0 0 auto;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.1;
      margin-top: 3px;
    }

    .brand-tag {
      display: inline-block;
      margin-top: 8px;
      padding: 3px 9px;
      border-radius: 5px;
      color: var(--green);
      background: #ecfdf5;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .navigation {
      padding: 24px 14px;
      flex: 1;
    }

    .nav-label {
      margin: 0 10px 13px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .nav-button {
      width: 100%;
      border: 0;
      border-radius: 11px;
      background: transparent;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 12px 13px;
      margin-bottom: 4px;
      text-align: left;
      font-size: 16px;
      font-weight: 500;
    }

    .nav-button:hover {
      color: var(--text);
      background: #f8fafc;
    }

    .nav-button.active {
      color: var(--navy);
      background: #eff6ff;
      font-weight: 700;
    }

    .nav-icon {
      width: 22px;
      text-align: center;
      font-size: 18px;
    }

    .nav-count {
      margin-left: auto;
      min-width: 21px;
      height: 21px;
      padding: 0 6px;
      border-radius: 11px;
      background: var(--danger);
      color: white;
      display: none;
      place-items: center;
      font-size: 11px;
      font-weight: 800;
    }

    .nav-count.show {
      display: grid;
    }

    .sidebar-footer {
      padding: 16px;
    }

    .account-card {
      padding: 15px 14px;
      border-radius: 12px;
      background: var(--page);
      margin-bottom: 14px;
    }

    .account-name {
      font-weight: 800;
      font-size: 15px;
    }

    .account-school {
      color: var(--muted);
      font-size: 12px;
      margin-top: 7px;
    }

    .logout-button {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: white;
      color: var(--text);
      font-weight: 700;
      text-align: left;
    }

    .main-area {
      margin-left: var(--sidebar-width);
      min-width: 0;
      flex: 1;
    }

    .topbar {
      height: var(--topbar-height);
      background: var(--white);
      border-bottom: 1px solid var(--line);
      padding: 0 30px;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .breadcrumb {
      color: var(--muted);
      font-size: 14px;
    }

    .breadcrumb strong {
      color: var(--text);
    }

    .content {
      padding: 28px 30px 50px;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
      animation: fade-in 0.18s ease-out;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .page-heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
    }

    .page-title {
      font-size: 29px;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .page-description {
      color: var(--muted);
      margin-top: 6px;
      font-size: 15px;
    }

    .button {
      border: 0;
      border-radius: 10px;
      padding: 11px 17px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 700;
      font-size: 14px;
    }

    .button-primary {
      color: white;
      background: linear-gradient(135deg, var(--navy), var(--blue));
    }

    .button-success {
      color: white;
      background: linear-gradient(135deg, var(--green), var(--mint));
    }

    .button-outline {
      color: var(--text);
      background: white;
      border: 1px solid var(--line);
    }

    .button-danger {
      color: var(--danger);
      background: #fef2f2;
      border: 1px solid #fecaca;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--white);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .panel-header {
      padding: 17px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 800;
    }

    .panel-body {
      padding: 22px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 22px;
    }

    .stat-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--green));
    }

    .stat-value {
      font-size: 25px;
      font-weight: 800;
    }

    .stat-value.green {
      color: var(--green);
    }

    .stat-value.red {
      color: var(--danger);
    }

    .stat-label {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .notice {
      border: 1px solid #bfdbfe;
      border-radius: 11px;
      background: #eff6ff;
      color: #1d4ed8;
      padding: 14px 16px;
      margin-bottom: 20px;
      line-height: 1.5;
      font-size: 13px;
    }

    .child-card {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 14px;
      margin-bottom: 12px;
    }

    .child-card:last-child {
      margin-bottom: 0;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      color: white;
      background: linear-gradient(135deg, var(--blue), var(--green));
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 800;
    }

    .child-name {
      font-size: 17px;
      font-weight: 800;
    }

    .child-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .balance-block {
      text-align: right;
    }

    .balance-value {
      color: var(--green);
      font-weight: 800;
      font-size: 16px;
    }

    .balance-label {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .empty-state {
      color: var(--muted);
      text-align: center;
      padding: 42px 20px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 12px 15px;
      text-align: left;
      color: var(--muted);
      background: var(--page);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td {
      padding: 14px 15px;
      border-top: 1px solid var(--line);
      font-size: 13px;
    }

    .money {
      font-weight: 800;
    }

    .money.green {
      color: var(--green);
    }

    .pill {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 7px;
      color: var(--green);
      background: #ecfdf5;
      font-size: 11px;
      font-weight: 800;
    }

    .receipt-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 18px;
    }

    .receipt {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 22px;
      background: #fffefb;
    }

    .receipt-heading {
      text-align: center;
      padding-bottom: 15px;
      border-bottom: 3px double var(--navy);
      margin-bottom: 13px;
    }

    .receipt-school {
      color: var(--navy);
      font-size: 19px;
      font-weight: 800;
    }

    .receipt-title {
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .receipt-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 7px 0;
      border-bottom: 1px dotted var(--line);
      font-size: 13px;
    }

    .receipt-actions {
      display: flex;
      gap: 8px;
      margin-top: 15px;
    }

    .notification {
      padding: 17px 20px;
      border-bottom: 1px solid var(--line);
    }

    .notification:last-child {
      border-bottom: 0;
    }

    .notification.unread {
      background: #f0f9ff;
    }

    .notification-title {
      font-weight: 800;
    }

    .notification-message,
    .notification-time {
      color: var(--muted);
      margin-top: 5px;
      font-size: 13px;
    }

    .notification-time {
      font-size: 11px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
    }

    .form-input {
      width: 100%;
      padding: 11px 12px;
      border: 1.5px solid var(--line);
      border-radius: 9px;
      background: white;
      color: var(--text);
      outline: none;
    }

    .form-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(23, 104, 178, 0.1);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      padding: 20px;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 16px;
      background: white;

  <script>
    let session = null;
    let parent = null;
    let school = null;
    let children = [];
    let payments = [];
    let notifications = [];
    let receiptViewMode = 'list';
    let receiptSearchQuery = '';
    let receiptSortMode = 'date-desc';
    let reportViewMode = 'list';
    let hiddenReports = JSON.parse(safeStorage.getItem('ff_hidden_reports') || '[]');
    let activeEditingChildId = null;

    function safeArray(key) {
      try {
        const value = JSON.parse(safeStorage.getItem(key) || "[]");
        return Array.isArray(value) ? value : [];
      } catch (error) {
        return [];
      }
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, character => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[character]));
    }

    function money(value) {
      return "KES " + Number(value || 0).toLocaleString("en-KE");
    }

    // Accepts 07XXXXXXXX, 01XXXXXXXX, 7XXXXXXXX, 2547XXXXXXXX, +2547XXXXXXXX
    // Returns the normalized 2547XXXXXXXX / 2541XXXXXXXX format M-Pesa expects, or null if invalid.
    function normalizeKenyanPhone(raw) {
      const digits = String(raw || "").replace(/\D/g, "");
      if (/^254(7|1)\d{8}$/.test(digits)) return digits;
      if (/^0(7|1)\d{8}$/.test(digits)) return "254" + digits.slice(1);
      if (/^(7|1)\d{8}$/.test(digits)) return "254" + digits;
      return null;
    }

    function initialize() {
      const parents = safeArray("ff_parents");
      const schools = safeArray("ff_schools");
      const sessions = safeArray("ff_sessions");
      const existingSession = sessions.length === 1
        ? sessions.find(item => item.type === "parent" && Date.now() - Number(item.timestamp || 0) < 86400000)
        : null;

      parent = existingSession
        ? parents.find(item => item.id === existingSession.parentId && item.schoolId === existingSession.schoolId)
        : null;

      // Require a valid, current parent session. Never silently reopen an account
      // after logout or manufacture a local account.
      if (!parent && typeof window.ensureDemoSession === 'function') {
        const demoSess = window.ensureDemoSession('parent');
        if (demoSess) {
          parent = parents.find(item => item.id === demoSess.parentId && item.schoolId === demoSess.schoolId) || parents[0];
          session = demoSess;
        }
      }

      if (!parent) {
        safeStorage.setItem("ff_sessions", "[]");
        renderSignedOutPage();
        return;
      }

      session = existingSession;

      school = schools.find(item => item.id === parent.schoolId) || {
        id: parent.schoolId,
        name: parent.schoolName || "School not assigned",
        paybill: ""
      };

      children = safeArray("ff_students").filter(item => item.parentId === parent.id);
      const childIds = new Set(children.map(item => item.id));
      payments = safeArray("ff_payments").filter(item => childIds.has(item.studentId));
      notifications = safeArray("ff_notifications").filter(item => item.parentId === parent.id);

      renderShell();
      renderAllViews();
    }

    function renderSignedOutPage() {
      document.getElementById("app").innerHTML = `
        <div class="access-page">

              <button class="button button-outline" style="width:100%;background:#f0fdf4;border-color:#10b981;color:#059669;font-weight:700;" onclick="autoLoginDemoParent()">
                ⚡ Auto-Login Demo Parent (Grace Mwangi)
              </button>
            </div>
          </div>
        </div>`;
    }
    function autoLoginDemoParent() {
      if (typeof window.ensureDemoSession === 'function') window.ensureDemoSession('parent');
      location.reload();
    }

    function renderAccessPage(parents) {
      const accountButtons = parents.map(item => {
        const accountSchool = safeArray("ff_schools").find(value => value.id === item.schoolId);
        return `
          <button class="button button-outline" style="width:100%;margin-top:9px" onclick="enterParent('${item.id}')">
            ${escapeHtml(item.name)} — ${escapeHtml(accountSchool?.name || item.schoolName || "School")}
          </button>
        `;
      }).join("");

      document.getElementById("app").innerHTML = `
        <div class="access-page">
          <div class="access-card">
            <div style="font-size:48px">🎓</div>
            <h1 style="margin-top:12px">FeeFlow Parent Portal</h1>
            <p class="page-description" style="margin-bottom:18px">More than one parent account was found on this device. Choose which one to open.</p>
            ${accountButtons || '<div class="notice">No parent accounts have been registered.</div>'}
          </div>
        </div>
      `;
    }

    function enterParent(parentId) {
      const account = safeArray("ff_parents").find(item => item.id === parentId);
      if (!account) return;

      safeStorage.setItem("ff_sessions", JSON.stringify([{
        id: "parent_" + Date.now(),
        type: "parent",
        parentId: account.id,
        schoolId: account.schoolId,
        name: account.name,
        timestamp: Date.now()
      }]));

      location.reload();
    }

    
let currentParentSidebarMode = safeStorage.getItem('ff_parent_sidebar_mode') || 'standard';
let lastActiveParentView = 'dashboard';
let activeParentPreviewNotifId = null;

function setParentSidebarMode(mode) {
    currentParentSidebarMode = mode;
    safeStorage.setItem('ff_parent_sidebar_mode', mode);
    document.body.classList.remove('sidebar-narrow', 'sidebar-standard', 'sidebar-wide', 'sidebar-compact', 'sidebar-closed');
    document.body.classList.add('sidebar-' + mode);
}


function setupParentSidebarResizer() {
    const sidebar = document.querySelector('.sidebar');
    const resizer = document.querySelector('.sidebar-resizer');
    if (!sidebar || !resizer) return;

    let isResizing = false;
    resizer.addEventListener('mousedown', function(e) {
        isResizing = true;
        resizer.classList.add('resizing');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
        if (!isResizing) return;
        let newWidth = e.clientX;
        if (newWidth < 70) {
            document.body.classList.add('sidebar-closed');
            const main = document.querySelector('.main-content');
            if (main) main.style.marginLeft = '0px';
            return;
        } else {
            document.body.classList.remove('sidebar-closed');
        }
        if (newWidth < 160) newWidth = 160;
        if (newWidth > 480) newWidth = 480;
        
        document.documentElement.style.setProperty('--sidebar-width', newWidth + 'px');
        const main = document.querySelector('.main-content');
        if (main) main.style.marginLeft = newWidth + 'px';
    });

    document.addEventListener('mouseup', function() {
        if (isResizing) {
            isResizing = false;
            resizer.classList.remove('resizing');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            const currentWidth = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-width')) || 250;
            safeStorage.setItem('ff_custom_parent_sidebar_width', String(currentWidth));
            safeStorage.setItem('ff_parent_sidebar_closed', 'false');
        }
    });

    // Load saved width
    const savedWidth = safeStorage.getItem('ff_custom_parent_sidebar_width');
    const savedState = safeStorage.getItem('ff_parent_sidebar_closed');
    if (savedWidth && !isNaN(savedWidth)) {
        const w = Number(savedWidth);
        document.documentElement.style.setProperty('--sidebar-width', w + 'px');
        const main = document.querySelector('.main-content');
        if (main && savedState !== 'true') main.style.marginLeft = w + 'px';
    }
    if (savedState === 'true') {
        document.body.classList.add('sidebar-closed');
        const main = document.querySelector('.main-content');
        if (main) main.style.marginLeft = '0px';
    }
}

function toggleParentSidebarState() {
    const isClosed = document.body.classList.contains('sidebar-closed');
    const main = document.querySelector('.main-content');
    const w = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-width')) || 250;
    if (isClosed) {
        document.body.classList.remove('sidebar-closed');
        if (main) main.style.marginLeft = w + 'px';
        safeStorage.setItem('ff_parent_sidebar_closed', 'false');
    } else {
        document.body.classList.add('sidebar-closed');
        if (main) main.style.marginLeft = '0px';
        safeStorage.setItem('ff_parent_sidebar_closed', 'true');
    }
}

/* replaced toggleParentSidebarState */ function old_toggleParentSidebarState() {
    if (currentParentSidebarMode === 'closed' || currentParentSidebarMode === 'compact') {
        setParentSidebarMode('standard');
    } else {
        setParentSidebarMode('compact');
    }
}

function initParentAutoSuggestAndSearchableSelects() {
    const select = document.getElementById('paymentStudent');
    if (select && !select.dataset.autoSuggestInit) {
        select.dataset.autoSuggestInit = 'true';
        select.style.display = 'none';

        const wrapper = document.createElement('div');
        wrapper.className = 'auto-suggest-wrapper';
        wrapper.style.cssText = 'position:relative;width:100%;flex:1;';

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'form-input auto-suggest-input';
        input.placeholder = '🔍 Search child to pay for...';
        input.style.cssText = 'width:100%;';
        
        const popup = document.createElement('div');
        popup.className = 'auto-suggest-popup';
        popup.style.cssText = 'position:absolute;top:100%;left:0;right:0;max-height:200px;overflow-y:auto;background:var(--paper);border:1.5px solid var(--green);border-radius:8px;box-shadow:0 10px 28px rgba(0,0,0,0.18);z-index:99999;display:none;';

        wrapper.appendChild(input);
        wrapper.appendChild(popup);
        select.parentNode.insertBefore(wrapper, select);

        function updateList() {
            const q = input.value.trim().toLowerCase();
            const options = Array.from(select.options).filter(o => o.value !== '');
            const matches = options.filter(o => !q || o.text.toLowerCase().includes(q));
            
            if (!matches.length) {
                popup.innerHTML = '<div style="padding:10px 12px;color:var(--muted);font-size:12px;">No matching children found.</div>';
            } else {
                popup.innerHTML = matches.map(o => `
                    <div class="auto-suggest-item" data-value="${o.value}" style="padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--line);transition:background 0.15s;color:var(--ink);">
                        <i class="fas fa-user-graduate" style="margin-right:6px;color:var(--green);"></i> ${escapeHtml(o.text)}
                    </div>
                `).join('');
            }
            popup.style.display = 'block';
        }

        input.addEventListener('focus', updateList);
        input.addEventListener('input', updateList);

        popup.addEventListener('click', e => {
            const item = e.target.closest('.auto-suggest-item');
            if (!item) return;
            const val = item.dataset.value;
            select.value = val;
            input.value = item.textContent.trim().replace(/^.*?\s+/, '');
            popup.style.display = 'none';
            select.dispatchEvent(new Event('change'));
        });

        document.addEventListener('click', e => {
            if (!wrapper.contains(e.target)) popup.style.display = 'none';
        });

        select.addEventListener('change', () => {
            const opt = select.options[select.selectedIndex];
            if (opt && opt.value) input.value = opt.text;
            else input.value = '';
        });
    }
}

          <span>${label}</span>
          ${countId ? `<span class="nav-count" id="${countId}"></span>` : ""}

    function renderAllViews() {
      renderDashboard();
      renderChildren();
      renderPayments();
      renderFeeReports();
      renderNotifications();
      renderProfile();
      updateNotificationBadge();
    }

        <div class="page-heading">
          <div>
            <h1 class="page-title">Welcome, ${escapeHtml((parent.name || "Parent").split(" ")[0])}</h1>

        </div>

        </div>

        <div class="stats-grid">
          ${statCard(children.length, "Children linked")}
          ${statCard(money(paid), "Fees paid", "green")}

          <div class="stat-label">${label}</div>
        </div>

    function renderChildren() {
      document.getElementById("view-children").innerHTML = `
        <div class="page-heading">
          <div>
            <h1 class="page-title">My Children</h1>
            <p class="page-description">Students linked to your verified parent account. <span style="color:var(--green);font-weight:600;">Click on any child below to edit details or inspect full fee breakdowns.</span></p>
          </div>
          <button class="button button-primary" onclick="openModal('childModal')">＋ Add Child</button>
        </div>

        <div class="panel">
          <div class="panel-body">${childrenMarkup()}</div>
        </div>
      `;
    }

    function childrenMarkup() {
      if (!children.length) {
        return '<div class="empty-state">No children are linked to this account yet. Click Add Child above.</div>';
      }

      return children.map(child => {
        const balanceDue = Number(child.balance || 0) > 0;
        return `
        <div class="child-card" onclick="openChildDetailsModal('${child.id}')" style="cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;" title="Click to view/edit student details and fee ledger">

          <div style="flex:1;">
            <div class="child-name" style="display:flex;align-items:center;gap:6px;">
              ${escapeHtml(child.name)}
              <span style="font-size:11px;background:#e2e8f0;color:#1e293b;padding:2px 6px;border-radius:4px;">✎ Edit</span>
            </div>
            <div class="child-meta">${escapeHtml(child.class || "Class not assigned")} • ${escapeHtml(child.adm || "No admission number")} ${child.boarding ? '• Boarder' : '• Day Scholar'}</div>
          </div>
          <div class="balance-block" style="text-align:right;">
            <div class="balance-value" style="${balanceDue ? "color:var(--danger)" : "color:var(--green)"}">${money(child.balance)}</div>
            <div class="balance-label">${balanceDue ? "Balance due" : "Fully paid"}</div>
          </div>
        </div>

    function openChildDetailsModal(childId) {
      const child = children.find(c => c.id === childId);
      if (!child) return;
      activeEditingChildId = childId;
      document.getElementById("childModalTitle").textContent = `${child.name} — Profile & Fee Ledger`;
      
      const publication = JSON.parse(safeStorage.getItem("ff_fee_published_" + parent.schoolId) || "null");
      let feeBreakdownHtml = '<p style="color:var(--muted);font-size:13px;">No published fee structure available.</p>';
      if (publication && publication.levels) {
        const normalize = v => String(v||'').replace(/[A-Z]$/,'').replace(/^Class /,'Grade ').trim().toLowerCase();
        let matchGrade = null;
        for (const lvl of publication.levels) {
          matchGrade = lvl.grades.find(g => normalize(g.name) === normalize(child.class));
          if (matchGrade) break;
        }
        if (matchGrade && matchGrade.fees) {
          const rows = matchGrade.fees.filter(f => !f.boarderOnly || child.boarding).map(f => {
            const tot = (f.amounts||[]).reduce((a,b)=>a+Number(b||0),0);
            return `<tr><td>${escapeHtml(f.name)} ${f.boarderOnly?'<span style="font-size:10px;color:var(--gold)">(Boarders)</span>':''}</td><td style="text-align:right;font-weight:600;">${money(tot)}</td></tr>`;
          }).join('');
          feeBreakdownHtml = `<div class="table-wrap"><table style="width:100%;font-size:13px;"><thead><tr><th>Fee Item</th><th style="text-align:right;">Annual Total</th></tr></thead><tbody>${rows}<tr><td><strong>Total Expected</strong></td><td style="text-align:right;font-weight:700;color:var(--ink);">${money(child.total)}</td></tr></tbody></table></div>`;
        }
      }

      const childPayments = payments.filter(p => p.studentId === child.id);
      const payRows = childPayments.length ? childPayments.map(p => `<tr><td>${escapeHtml(p.date||'—')}</td><td><strong>${escapeHtml(p.ref)}</strong></td><td style="color:var(--green);font-weight:600;">${money(p.amount)}</td></tr>`).join('') : '<tr><td colspan="3" style="text-align:center;color:var(--muted);">No payments recorded yet.</td></tr>';

      document.getElementById("childModalBody").innerHTML = `
        <div style="margin-bottom:20px;padding:14px;background:var(--paper-dim);border-radius:10px;border:1px solid var(--line);">
          <h4 style="margin:0 0 12px 0;color:var(--ink);font-size:14px;">✎ Edit Student Profile</h4>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="form-group" style="margin:0;">
              <label class="form-label" style="font-size:12px;">Full Name</label>
              <input class="form-input" id="editChildName" value="${escapeHtml(child.name)}">
            </div>
            <div class="form-group" style="margin:0;">
              <label class="form-label" style="font-size:12px;">Admission No.</label>
              <input class="form-input" id="editChildAdm" value="${escapeHtml(child.adm||'')}">
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;">
            <div class="form-group" style="margin:0;">
              <label class="form-label" style="font-size:12px;">Class / Grade</label>
              <input class="form-input" id="editChildClass" value="${escapeHtml(child.class||'Grade 4')}">
            </div>
            <div class="form-group" style="margin:0;">
              <label class="form-label" style="font-size:12px;">Boarding Status</label>
              <select class="form-input" id="editChildBoarding">
                <option value="false" ${!child.boarding?'selected':''}>Day Scholar</option>
                <option value="true" ${child.boarding?'selected':''}>Boarder (+Meal/Room Plan)</option>
              </select>
            </div>
          </div>
        </div>

        <div style="margin-bottom:20px;">
          <h4 style="margin:0 0 8px 0;color:var(--ink);font-size:14px;">Assessment & Remaining Balance</h4>
          <div class="stats-grid" style="margin-bottom:12px;">
            <div class="stat-card" style="padding:10px;"><div class="label" style="font-size:11px;">Expected</div><div class="value" style="font-size:16px;">${money(child.total)}</div></div>
            <div class="stat-card" style="padding:10px;"><div class="label" style="font-size:11px;">Paid</div><div class="value" style="font-size:16px;color:var(--green);">${money(child.paid)}</div></div>
            <div class="stat-card" style="padding:10px;"><div class="label" style="font-size:11px;">Balance</div><div class="value" style="font-size:16px;${Number(child.balance)>0?'color:var(--danger)':''}">${money(child.balance)}</div></div>
          </div>
          ${feeBreakdownHtml}
        </div>

        <div>
          <h4 style="margin:0 0 8px 0;color:var(--ink);font-size:14px;">Payment History (${childPayments.length})</h4>
          <div class="table-wrap"><table style="width:100%;font-size:12.5px;"><thead><tr><th>Date</th><th>Ref</th><th>Amount</th></tr></thead><tbody>${payRows}</tbody></table></div>
        </div>
      `;
      openModal("childDetailsModal");
    }

    function saveChildEdit() {
      if (!activeEditingChildId) return;
      const allStudents = JSON.parse(safeStorage.getItem("ff_students") || "[]");
      const idx = allStudents.findIndex(s => s.id === activeEditingChildId);
      if (idx !== -1) {
        allStudents[idx].name = document.getElementById("editChildName").value.trim() || allStudents[idx].name;
        allStudents[idx].adm = document.getElementById("editChildAdm").value.trim() || allStudents[idx].adm;
        allStudents[idx].class = document.getElementById("editChildClass").value.trim() || allStudents[idx].class;
        allStudents[idx].boarding = document.getElementById("editChildBoarding").value === "true";
        allStudents[idx].initials = initials(allStudents[idx].name);
        
        // Recalculate total assessment if structure changed
        const publication = JSON.parse(safeStorage.getItem("ff_fee_published_" + parent.schoolId) || "null");
        if (publication) {
          const normalize = v => String(v||'').replace(/[A-Z]$/,'').replace(/^Class /,'Grade ').trim().toLowerCase();
          for (const lvl of publication.levels) {
            const grade = lvl.grades.find(g => normalize(g.name) === normalize(allStudents[idx].class));
            if (grade) {
              const expected = grade.fees.filter(f => !f.boarderOnly || allStudents[idx].boarding).reduce((sum,f) => sum + (f.amounts||[]).reduce((a,n)=>a+Number(n||0),0), 0);
              allStudents[idx].total = expected;
              allStudents[idx].balance = Math.max(0, expected - Number(allStudents[idx].paid || 0));
              break;
            }
          }
        }
        
        safeStorage.setItem("ff_students", JSON.stringify(allStudents));
        closeModal("childDetailsModal");
        initialize();
        renderDashboard();
        renderChildren();
      }
    }

    function deleteChildAccount() {
      if (!activeEditingChildId) return;
      if (confirm("Are you sure you want to remove this student record from your parent portal view?")) {
        let allStudents = JSON.parse(safeStorage.getItem("ff_students") || "[]");
        allStudents = allStudents.filter(s => s.id !== activeEditingChildId);
        safeStorage.setItem("ff_students", JSON.stringify(allStudents));
        closeModal("childDetailsModal");
        initialize();
        renderDashboard();
        renderChildren();
      }
    }

    function initials(name) {
      return String(name || "")
        .split(/\s+/)
        .filter(Boolean)
        .map(part => part[0])
        .join("")
        .slice(0, 2)
        .toUpperCase();
    }

    function renderPayments() {
      const rows = payments.length
        ? payments.map(payment => `
            <tr>
              <td><strong>${escapeHtml(payment.ref || payment.id)}</strong></td>
              <td>${escapeHtml(payment.studentName || "—")}</td>
              <td class="money green">${money(payment.amount)}</td>
              <td>${escapeHtml(payment.method || "M-Pesa")}</td>
              <td><span class="pill">${escapeHtml(payment.status || "Paid")}</span></td>
              <td>${escapeHtml(payment.date || "—")}</td>
            </tr>
          `).join("")
        : '<tr><td colspan="6" class="empty-state">No confirmed payments yet.</td></tr>';

      document.getElementById("view-payments").innerHTML = `
        <div class="page-heading">
          <div>
            <h1 class="page-title">Payments & Receipts</h1>
            <p class="page-description">Confirmed fee payments and official receipts</p>
          </div>
          <button class="button button-success" onclick="openPaymentModal()">▣ Make Payment</button>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Reference</th>

                  <th>Amount</th>
                  <th>Method</th>
                  <th>Status</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>

        <div class="page-heading" style="margin-top:26px">
          <div>
            <h2>Receipt Previews</h2>
            <p class="page-description">Print or download confirmed fee receipts</p>
          </div>
        </div>

        <div class="receipt-grid">${receiptsMarkup()}</div>
      `;
    }

    function receiptsMarkup() {
      if (!payments.length) {
        return '<div class="panel"><div class="empty-state">Receipts appear after a payment is confirmed.</div></div>';
      }

      return payments.map(payment => `
        <article class="receipt">
          <div class="receipt-heading">
            <div class="receipt-school">${escapeHtml(school.name || "School")}</div>
            <div class="receipt-title">OFFICIAL FEE RECEIPT</div>
          </div>
          ${receiptRow("Receipt", payment.ref || payment.id)}
          ${receiptRow("Student", payment.studentName || "—")}
          ${receiptRow("Class", payment.class || "—")}
          ${receiptRow("Amount", money(payment.amount))}
          ${receiptRow("Method", payment.method || "M-Pesa")}
          ${receiptRow("Paybill", payment.paybill || school.paybill || "—")}
          ${receiptRow("Date", payment.date || "—")}
          <div class="receipt-actions">
            <button class="button button-outline" onclick="printReceipt('${payment.id}')">▣ Print</button>
            <button class="button button-primary" onclick="downloadReceipt('${payment.id}')">↓ Download</button>
          </div>
        </article>
      `).join("");
    }

    function receiptRow(label, value) {
      return `
        <div class="receipt-row">
          <span>${escapeHtml(label)}</span>
          <strong>${escapeHtml(value)}</strong>
        </div>
      `;
    }

    function normalizeGrade(value) {
      return String(value || "")
        .replace(/[A-Z]$/, "")
        .replace(/^Class /i, "Grade ")
        .trim()
        .toLowerCase();
    }

    function findPublishedGrade(publication, child) {
      for (const level of publication?.levels || []) {
        const grade = (level.grades || []).find(item => normalizeGrade(item.name) === normalizeGrade(child.class));
        if (grade) return { level: level.name, grade };
      }
      return null;
    }

    function renderFeeReports() {
      const publication = JSON.parse(safeStorage.getItem("ff_fee_published_" + parent.schoolId) || "null");
      const termNames = JSON.parse(safeStorage.getItem("ff_fee_term_names_" + parent.schoolId) || "null") || ["Term 1", "Term 2", "Term 3"];

      const visibleChildren = children.filter(c => !hiddenReports.includes(c.id));

      let body = "";

        body = '<div class="panel"><div class="empty-state">Your school has not published a fee structure yet.</div></div>';
      } else if (!children.length) {
        body = '<div class="panel"><div class="empty-state">Add a child to view a matching fee report.</div></div>';
      } else if (!visibleChildren.length) {
        body = '<div class="panel"><div class="empty-state">All fee reports are currently minimized or cleared. <button class="button button-outline" style="margin-top:10px;" onclick="hiddenReports=[];safeStorage.setItem(&quot;ff_hidden_reports&quot;,&quot;[]&quot;);renderFeeReports();">Restore All Reports</button></div></div>';

        body = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;max-width:780px;margin:0 auto;">' +

                <div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#0c2d57,#1a6dcc);color:white;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 10px;">📊</div>

    function saveChild() {
      const name = document.getElementById("childName").value.trim();
      const adm = document.getElementById("childAdm").value.trim();
      const childClass = document.getElementById("childClass").value.trim();

      if (!name || !adm || !childClass) {
        alert("Complete all child details.");
        return;
      }

      const students = safeArray("ff_students");

      if (students.some(item => item.schoolId === parent.schoolId && String(item.adm).toLowerCase() === adm.toLowerCase())) {
        alert("That admission number is already registered at this school.");
        return;
      }

      students.push({
        id: "child_" + Date.now(),
        parentId: parent.id,
        schoolId: parent.schoolId,
        name,
        adm,
        class: childClass,
        total: 0,
        paid: 0,
        balance: 0,
        status: "paid",
        initials: initials(name),
        color: "linear-gradient(135deg,#1768b2,#059669)"
      });

      safeStorage.setItem("ff_students", JSON.stringify(students));
      document.getElementById("childName").value = "";

      closeModal("childModal");

    function openPaymentModal() {
      if (!children.length) {
        alert("Add a child before making a payment.");

      const studentSelect = document.getElementById("paymentStudent");
      studentSelect.innerHTML = children.map(child => `
        <option value="${child.id}" data-balance="${Number(child.balance || 0)}">${escapeHtml(child.name)} — Balance ${money(child.balance)}</option>

      document.getElementById("paymentPhone").value = parent.phone || "";
      document.getElementById("paymentAmount").value = "";

    function updatePaymentAmountHint() {
      const studentSelect = document.getElementById("paymentStudent");
      const amountInput = document.getElementById("paymentAmount");
      if (!studentSelect || !amountInput) return;
      const selected = studentSelect.options[studentSelect.selectedIndex];
      const balance = selected ? Number(selected.dataset.balance || 0) : 0;
      amountInput.placeholder = balance > 0 ? `Up to ${money(balance)}` : "Enter amount";
    }

    async function makePayment() {
      const studentId = document.getElementById("paymentStudent").value;
      const amount = Number(document.getElementById("paymentAmount").value);
      const rawPhone = document.getElementById("paymentPhone").value.trim();
      const phone = normalizeKenyanPhone(rawPhone);
      const button = document.getElementById("payButton");

      if (!studentId || !amount || amount <= 0) {
        alert("Choose a student and enter a valid amount.");
        return;
      }

      if (!phone) {
        alert("Enter a valid Safaricom number, e.g. 07XX XXX XXX or 7XX XXX XXX.");
        return;
      }

      if (!school.paybill) {
        alert("The school has not configured its official M-Pesa paybill.");
        return;
      }

      if (!school.stkEndpoint) {
        alert("The school has not connected its secure STK Push endpoint.");
        return;
      }

      const student = children.find(item => item.id === studentId);
      if (!student) return;
      if (Number(student.balance) > 0 && amount > Number(student.balance)) {
        alert("The payment amount cannot exceed the remaining balance of " + money(student.balance) + ".");
        return;
      }

      button.disabled = true;
      button.textContent = "Sending…";

      try {
        const response = await fetch(school.stkEndpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            phone,
            amount,
            paybill: school.paybill,
            accountReference: student.adm,
            studentId: student.id,
            schoolId: school.id
          })
        });

        const result = await response.json().catch(() => ({}));

        if (!response.ok || result.success === false) {
          throw new Error(result.message || "STK Push request failed.");
        }

        const reference = result.reference || result.checkoutRequestId;
        if (!reference) {
          throw new Error("The payment service did not return a reference.");
        }

        recordConfirmedPayment(student, amount, phone, reference);
        closeModal("paymentModal");
        initialize();
        showView("payments");
        alert("Payment confirmed. Your receipt is ready.");
      } catch (error) {
        alert(error.message || "Unable to complete the STK Push request.");
      } finally {
        button.disabled = false;
        button.textContent = "Send STK Push";
      }
    }

    function recordConfirmedPayment(student, amount, phone, reference) {
      const students = safeArray("ff_students");
      const studentRecord = students.find(item => item.id === student.id);
      if (!studentRecord) return;

      studentRecord.paid = Number(studentRecord.paid || 0) + amount;
      studentRecord.balance = Math.max(0, Number(studentRecord.total || 0) - studentRecord.paid);
      studentRecord.status = studentRecord.balance === 0 ? "paid" : "partial";
      safeStorage.setItem("ff_students", JSON.stringify(students));

      const payment = {
        id: "payment_" + Date.now(),
        ref: reference,
        studentId: studentRecord.id,
        studentName: studentRecord.name,
        class: studentRecord.class,
        amount,
        method: "M-Pesa STK",
        status: "reconciled",
        date: new Date().toLocaleString(),
        schoolId: school.id,
        schoolName: school.name,
        paybill: school.paybill,
        stkPhone: phone
      };

      const allPayments = safeArray("ff_payments");
      allPayments.unshift(payment);
      safeStorage.setItem("ff_payments", JSON.stringify(allPayments));

      const allNotifications = safeArray("ff_notifications");
      allNotifications.unshift({
        id: Date.now(),
        audience: "school",
        schoolId: school.id,
        parentId: parent.id,
        studentId: studentRecord.id,
        type: "payment",
        title: "Payment Received — Receipt Ready",
        body: `${money(amount)} received for ${studentRecord.name}. Receipt ${reference} is ready.`,
        time: "Just now",
        unread: true
      });
      safeStorage.setItem("ff_notifications", JSON.stringify(allNotifications));
    }

    function markNotificationRead(notificationId) {
      const allNotifications = safeArray("ff_notifications");
      const record = allNotifications.find(item => String(item.id) === String(notificationId));
      if (record && record.parentId === parent.id) record.unread = false;
      safeStorage.setItem("ff_notifications", JSON.stringify(allNotifications));
      notifications = allNotifications.filter(item => item.parentId === parent.id);
      renderNotifications();
      updateNotificationBadge();
    }

    function markAllRead() {
      const allNotifications = safeArray("ff_notifications");
      allNotifications.forEach(item => {
        if (item.parentId === parent.id) item.unread = false;
      });
      safeStorage.setItem("ff_notifications", JSON.stringify(allNotifications));
      notifications.forEach(item => item.unread = false);
      renderNotifications();
      updateNotificationBadge();
    }

    function saveProfile() {
      const name = document.getElementById("profileName").value.trim();
      const rawPhone = document.getElementById("profilePhone").value.trim();
      const email = document.getElementById("profileEmail").value.trim();
      const phone = normalizeKenyanPhone(rawPhone);

      if (!name) {
        alert("Enter your full name.");
        return;
      }
      if (!phone) {
        alert("Enter a valid Safaricom number, e.g. 07XX XXX XXX or 7XX XXX XXX.");
        return;
      }
      if (!/^\S+@\S+\.\S+$/.test(email)) {
        alert("Enter a valid email address.");
        return;
      }

      const parents = safeArray("ff_parents");
      if (parents.some(item => item.id !== parent.id && String(item.email || "").toLowerCase() === email.toLowerCase())) {
        alert("That email address is already used by another parent account.");
        return;
      }
      const parentRecord = parents.find(item => item.id === parent.id);
      if (!parentRecord) return;

      parentRecord.name = name;
      parentRecord.phone = phone;
      parentRecord.email = email;
      safeStorage.setItem("ff_parents", JSON.stringify(parents));

      session.name = name;
      safeStorage.setItem("ff_sessions", JSON.stringify([session]));
      initialize();
      showView("profile");
      alert("Profile updated successfully.");
    }
