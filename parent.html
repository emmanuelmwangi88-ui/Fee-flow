<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FeeFlow — Parent Portal</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#0c2d57;--blue:#1a6dcc;--green:#059669;--bg:#f1f5f9;--white:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--red:#ef4444;--amber:#f59e0b;--side:250px}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}h1,h2,h3{font-family:'Space Grotesk',sans-serif}.layout{min-height:100vh;display:flex}.sidebar{position:fixed;inset:0 auto 0 0;width:var(--side);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column}.brand{padding:20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}.brand-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--green));color:white;display:grid;place-items:center}.brand-name{font-family:'Space Grotesk';font-weight:700;font-size:18px}.brand-tag{font-size:9px;font-weight:700;color:var(--green);background:#ecfdf5;padding:2px 6px;border-radius:4px}.nav{padding:16px 10px;flex:1}.nav-label{padding:4px 10px 8px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700}.nav-item{padding:10px;border-radius:10px;margin:2px 0;color:var(--muted);font-size:14px;font-weight:500;cursor:pointer;display:flex;gap:10px;align-items:center}.nav-item i{width:20px;text-align:center}.nav-item:hover{background:var(--bg);color:var(--text)}.nav-item.active{background:#eff6ff;color:var(--primary);font-weight:600}.user{margin:14px;padding:10px;background:var(--bg);border-radius:10px}.user strong{display:block;font-size:13px}.user span{font-size:11px;color:var(--muted)}.logout{margin:0 14px 14px;width:calc(100% - 28px)}.main{margin-left:var(--side);flex:1}.topbar{height:64px;background:white;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:5}.topbar span{font-size:13px;color:var(--muted)}.content{padding:24px}.section{display:none}.section.active{display:block}.page-head{display:flex;justify-content:space-between;gap:15px;align-items:flex-start;margin-bottom:24px}.page-title{font-size:26px;font-weight:700}.page-desc{font-size:14px;color:var(--muted);margin-top:3px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}.stat,.card{background:white;border:1px solid var(--border);border-radius:14px}.stat{padding:20px;position:relative;overflow:hidden}.stat:before{content:'';position:absolute;inset:0 0 auto;height:3px;background:linear-gradient(90deg,var(--blue),var(--green))}.stat-icon{width:42px;height:42px;border-radius:10px;background:#eff6ff;color:var(--blue);display:grid;place-items:center;margin-bottom:12px}.stat-value{font-family:'Space Grotesk';font-size:25px;font-weight:700}.stat-label{font-size:13px;color:var(--muted)}.card{overflow:hidden;margin-bottom:20px}.card-head{padding:16px 20px;border-bottom:1px solid var(--border);font-weight:700;display:flex;justify-content:space-between;align-items:center}.card-body{padding:20px}.child{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:16px;border:1px solid var(--border);border-radius:12px;margin-bottom:12px}.avatar{width:44px;height:44px;border-radius:11px;color:white;display:grid;place-items:center;font-weight:700}.child-name{font-weight:700}.meta{font-size:12px;color:var(--muted);margin-top:2px}.amount{font-family:'Space Grotesk';font-weight:700}.red{color:var(--red)}.green{color:var(--green)}.btn{border:0;border-radius:8px;padding:9px 15px;font:600 13px 'DM Sans';cursor:pointer;display:inline-flex;align-items:center;gap:7px}.btn-primary{color:white;background:linear-gradient(135deg,var(--primary),var(--blue))}.btn-green{color:white;background:linear-gradient(135deg,var(--green),#10b981)}.btn-outline{background:white;border:1.5px solid var(--border);color:var(--text)}table{width:100%;border-collapse:collapse}th{padding:11px 16px;background:var(--bg);color:var(--muted);font-size:11px;text-transform:uppercase;text-align:left}td{padding:12px 16px;border-top:1px solid var(--border);font-size:13px}.badge{padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600}.paid{background:#ecfdf5;color:var(--green)}.partial{background:#fffbeb;color:#b45309}.notice{padding:14px 16px;border:1px solid #bfdbfe;background:#eff6ff;color:#2563eb;border-radius:10px;margin-bottom:18px;font-size:13px}.empty{text-align:center;padding:35px;color:var(--muted)}.unauthorized{min-height:100vh;display:grid;place-items:center;text-align:center;padding:30px}.unauthorized i{font-size:60px;color:var(--red);margin-bottom:18px}.unauthorized p{color:var(--muted);margin:8px 0 20px}@media(max-width:800px){.sidebar{display:none}.main{margin:0}.grid{grid-template-columns:1fr}.content{padding:16px}.child{grid-template-columns:auto 1fr}.child>div:last-child{grid-column:2}.page-head{flex-direction:column}}
body.dark{--bg:#0f172a;--white:#111827;--border:#334155;--text:#f1f5f9;--muted:#94a3b8}body.dark .topbar,body.dark .sidebar,body.dark .card,body.dark .stat{background:#111827}body.dark th,body.dark .user{background:#1e293b}.modal{position:fixed;inset:0;background:#0008;display:none;place-items:center;padding:20px;z-index:20}.modal.open{display:grid}.modal-box{background:var(--white);border-radius:16px;width:100%;max-width:500px;padding:22px}.field{margin:12px 0}.field label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}.field input,.field select{width:100%;padding:11px;border:1.5px solid var(--border);border-radius:8px;background:var(--white);color:var(--text)}.notif{padding:14px;border-bottom:1px solid var(--border)}
</style>
</head>
<body>
<div id="app"></div>
<script>
let session, parent, school, children=[], payments=[], notifications=[];
const money=n=>'KES '+Number(n||0).toLocaleString();
function init(){
 const sessions=JSON.parse(localStorage.getItem('ff_sessions')||'[]');
 session=sessions.length===1?sessions.find(s=>s.type==='parent'&&Date.now()-s.timestamp<86400000):null;
 const parents=JSON.parse(localStorage.getItem('ff_parents')||'[]');
 if(!session){location.replace('portal.html');return}
 parent=parents.find(p=>p.id===session.parentId);
 if(!parent){localStorage.setItem('ff_sessions','[]');location.replace('portal.html');return}
 school=JSON.parse(localStorage.getItem('ff_schools')||'[]').find(s=>s.id===parent.schoolId)||{};
 children=JSON.parse(localStorage.getItem('ff_students')||'[]').filter(s=>s.parentId===parent.id);
 const ids=new Set(children.map(c=>c.id));
 payments=JSON.parse(localStorage.getItem('ff_payments')||'[]').filter(p=>ids.has(p.studentId));
 notifications=JSON.parse(localStorage.getItem('ff_notifications')||'[]').filter(n=>n.parentId===parent.id||(ids.has(n.studentId)&&n.audience!=='admin')); 
 setTheme(localStorage.getItem('ff_theme')||'light');
 renderShell(); renderAll();
}
function renderShell(){document.getElementById('app').innerHTML=`<div class="layout"><aside class="sidebar"><div class="brand"><div class="brand-icon"><i class="fas fa-graduation-cap"></i></div><div><div class="brand-name">FeeFlow</div><span class="brand-tag">PARENT PORTAL</span></div></div><nav class="nav"><div class="nav-label">My account</div><div class="nav-item active" data-page="dashboard" onclick="go('dashboard',this)"><i class="fas fa-chart-pie"></i>Dashboard</div><div class="nav-item" data-page="children" onclick="go('children',this)"><i class="fas fa-user-graduate"></i>My Children</div><div class="nav-item" data-page="payments" onclick="go('payments',this)"><i class="fas fa-receipt"></i>Payments & Receipts</div><div class="nav-item" data-page="notifications" onclick="go('notifications',this)"><i class="fas fa-bell"></i>Notifications <span id="notifCount"></span></div><div class="nav-item" data-page="profile" onclick="go('profile',this)"><i class="fas fa-user-cog"></i>Profile</div></nav><div class="user"><strong>${parent.name}</strong><span>${school.name||'School parent'}</span></div><button class="btn btn-outline logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Logout</button></aside><main class="main"><header class="topbar"><span>FeeFlow / <strong id="crumb">Dashboard</strong></span></header><div class="content"><section class="section active" id="dashboard"></section><section class="section" id="children"></section><section class="section" id="payments"></section><section class="section" id="notifications"></section><section class="section" id="profile"></section></div></main></div>`}
function renderAll(){
 const total=children.reduce((a,c)=>a+Number(c.total||0),0),paid=children.reduce((a,c)=>a+Number(c.paid||0),0),balance=children.reduce((a,c)=>a+Number(c.balance||0),0);
 document.getElementById('dashboard').innerHTML=`<div class="page-head"><div><h1 class="page-title">Welcome, ${parent.name.split(' ')[0]}</h1><p class="page-desc">View your children's fees and payment activity at ${school.name||'your school'}.</p></div><button class="btn btn-green" onclick="openPay()"><i class="fas fa-mobile-alt"></i> Make Payment</button></div><div class="notice"><i class="fas fa-circle-info"></i> Pay school fees using M-Pesa Paybill <strong>${school.paybill||'—'}</strong> and your child's admission number as the account.</div><div class="grid"><div class="stat"><div class="stat-icon"><i class="fas fa-user-graduate"></i></div><div class="stat-value">${children.length}</div><div class="stat-label">Children linked</div></div><div class="stat"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-value green">${money(paid)}</div><div class="stat-label">Fees paid</div></div><div class="stat"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-value red">${money(balance)}</div><div class="stat-label">Outstanding balance</div></div></div><div class="card"><div class="card-head">Fee summary</div><div class="card-body">${childCards()}</div></div>`;
 document.getElementById('children').innerHTML=`<div class="page-head"><div><h1 class="page-title">My Children</h1><p class="page-desc">Students linked to your verified parent account</p></div><button class="btn btn-primary" onclick="openAddChild()"><i class="fas fa-plus"></i>Add Child</button></div><div class="card"><div class="card-body">${childCards()}</div></div>`;
 document.getElementById('payments').innerHTML=`<div class="page-head"><div><h1 class="page-title">Payments & Receipts</h1><p class="page-desc">Your children's fee-payment history</p></div></div><div class="card"><div style="overflow:auto"><table><thead><tr><th>Reference</th><th>Student</th><th>Amount</th><th>Method</th><th>Status</th><th>Date</th><th>Receipt</th></tr></thead><tbody>${payments.length?payments.map(p=>`<tr><td><strong>${p.ref||p.id}</strong></td><td>${p.studentName||'—'}</td><td class="amount green">${money(p.amount)}</td><td>${p.method||'M-Pesa'}</td><td><span class="badge paid">${p.status||'Paid'}</span></td><td>${p.date||'—'}</td><td><button class="btn btn-outline" onclick="receipt('${p.id}')"><i class="fas fa-print"></i></button></td></tr>`).join(''):`<tr><td colspan="7" class="empty">No payments recorded yet.</td></tr>`}</tbody></table></div></div>`;
 document.getElementById('notifications').innerHTML=`<div class="page-head"><div><h1 class="page-title">Notifications</h1><p class="page-desc">Payment confirmations and school account updates</p></div><button class="btn btn-outline" onclick="markRead()">Mark all read</button></div><div class="card">${notifications.length?notifications.map(n=>`<div class="notif"><strong>${n.title}</strong><div class="meta">${n.body}</div><div class="meta">${n.time||'Recently'}</div></div>`).join(''):'<div class="empty">No notifications yet.</div>'}</div>`;
 const badge=document.getElementById('notifCount');if(badge)badge.textContent=notifications.filter(n=>n.unread).length||'';
 document.getElementById('profile').innerHTML=`<div class="page-head"><div><h1 class="page-title">Profile</h1><p class="page-desc">Your verified FeeFlow account</p></div></div><div class="card"><div class="card-head">Account information</div><div class="card-body"><div class="field"><label>Full name</label><input id="profileName" value="${parent.name}"></div><div class="field"><label>Phone</label><input id="profilePhone" value="${parent.phone||''}"></div><div class="field"><label>Email</label><input id="profileEmail" type="email" value="${parent.email||''}"></div><p><strong>School</strong><br><span class="meta">${school.name||parent.schoolName||'—'}</span></p><br><button class="btn btn-primary" onclick="saveProfile()"><i class="fas fa-save"></i>Save Profile</button><br><div class="field"><label>Appearance</label><select onchange="setTheme(this.value)"><option value="light">Light mode</option><option value="dark">Dark mode</option><option value="system">Use device setting</option></select></div></div></div>`;
}
function childCards(){return children.length?children.map(c=>`<div class="child"><div class="avatar" style="background:${c.color||'linear-gradient(135deg,#1a6dcc,#059669)'}">${c.initials||c.name.split(' ').map(x=>x[0]).join('').slice(0,2)}</div><div><div class="child-name">${c.name}</div><div class="meta">${c.class||'—'} • ${c.adm||'No admission number'}</div></div><div><div class="amount ${Number(c.balance)>0?'red':'green'}">${money(c.balance)}</div><div class="meta">Balance</div></div></div>`).join(''):`<div class="empty"><i class="fas fa-user-plus"></i><p>No children are linked to this account yet. Contact your school administrator.</p></div>`}
function go(page,el){document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));document.getElementById(page).classList.add('active');el.classList.add('active');document.getElementById('crumb').textContent=el.textContent.trim()}

function openPay(){if(!children.length){alert('No child is linked to this account.');return}document.body.insertAdjacentHTML('beforeend',`<div class="modal open" id="payModal"><div class="modal-box"><h2>M-Pesa STK Push</h2><p class="meta">Paybill: ${school.paybill||'Not configured'}</p><div class="field"><label>Student</label><select id="payChild">${children.map(c=>`<option value="${c.id}">${c.name} — Balance ${money(c.balance)}</option>`).join('')}</select></div><div class="field"><label>Amount (KES)</label><input id="payAmount" type="number" min="1"></div><div class="field"><label>M-Pesa phone number</label><input id="payPhone" value="${parent.phone||''}" placeholder="7XX XXX XXX"></div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-outline" onclick="document.getElementById('payModal').remove()">Cancel</button><button class="btn btn-green" onclick="makePayment()">Confirm Payment</button></div></div></div>`)}
async function makePayment(){
 const id=document.getElementById('payChild').value,amount=Number(document.getElementById('payAmount').value),phone=document.getElementById('payPhone').value.trim();
 if(!amount||phone.length<9){alert('Enter a valid amount and M-Pesa phone number.');return}
 if(!school.paybill){alert('The school has not configured its original paybill.');return}
 if(!school.stkEndpoint){alert('STK Push is not yet connected by the school administrator.');return}
 const st=children.find(x=>x.id===id);if(!st)return;
 try{
  const response=await fetch(school.stkEndpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone,amount,paybill:school.paybill,accountReference:st.adm,studentId:st.id,schoolId:parent.schoolId})});
  const result=await response.json().catch(()=>({}));if(!response.ok||result.success===false)throw new Error(result.message||'STK request failed');
  const ref=result.reference||result.checkoutRequestId;if(!ref)throw new Error('The payment service did not return a transaction reference.');
  const allStudents=JSON.parse(localStorage.getItem('ff_students')||'[]'),record=allStudents.find(x=>x.id===id);record.paid=Number(record.paid||0)+amount;record.balance=Math.max(0,Number(record.total||0)-record.paid);record.status=record.balance===0?'paid':'partial';localStorage.setItem('ff_students',JSON.stringify(allStudents));
  const allPayments=JSON.parse(localStorage.getItem('ff_payments')||'[]');allPayments.unshift({id:'p_'+Date.now(),ref,studentId:record.id,studentName:record.name,class:record.class,amount,method:'M-Pesa STK',status:'reconciled',date:new Date().toLocaleString(),schoolId:parent.schoolId,schoolName:school.name,paybill:school.paybill,stkPhone:phone});localStorage.setItem('ff_payments',JSON.stringify(allPayments));
  const allNotifs=JSON.parse(localStorage.getItem('ff_notifications')||'[]');allNotifs.unshift({id:Date.now(),audience:'school',schoolId:parent.schoolId,parentId:parent.id,studentId:record.id,type:'payment',title:'Payment Received',body:`${money(amount)} received for ${record.name} via M-Pesa (${ref}).`,time:'Just now',unread:true});localStorage.setItem('ff_notifications',JSON.stringify(allNotifs));
  document.getElementById('payModal').remove();alert('Payment confirmed.');init();
 }catch(error){alert(error.message||'Unable to initiate STK Push.');}
}
function receipt(id){const p=payments.find(x=>x.id===id);if(!p)return;const w=open('','_blank','width=650,height=750');w.document.write(`<title>Receipt ${p.ref}</title><div style="font-family:Arial;padding:40px"><h1>${school.name||'School'}</h1><h2>Official Fee Receipt</h2><hr><p><b>Receipt:</b> ${p.ref}</p><p><b>Student:</b> ${p.studentName}</p><p><b>Amount:</b> ${money(p.amount)}</p><p><b>Method:</b> ${p.method}</p><p><b>Date:</b> ${p.date}</p><hr><p>Confirmed through FeeFlow.</p></div>`);w.document.close();w.print()}
function openAddChild(){document.body.insertAdjacentHTML('beforeend',`<div class="modal open" id="childModal"><div class="modal-box"><h2>Add Child</h2><div class="field"><label>Full name</label><input id="newChildName"></div><div class="field"><label>Admission number</label><input id="newChildAdm"></div><div class="field"><label>Class</label><input id="newChildClass"></div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-outline" onclick="document.getElementById('childModal').remove()">Cancel</button><button class="btn btn-primary" onclick="saveChild()">Add Child</button></div></div></div>`)}
function saveChild(){const name=document.getElementById('newChildName').value.trim(),adm=document.getElementById('newChildAdm').value.trim(),cls=document.getElementById('newChildClass').value.trim();if(!name||!adm||!cls){alert('Complete all child details.');return}const all=JSON.parse(localStorage.getItem('ff_students')||'[]');if(all.some(s=>s.schoolId===parent.schoolId&&s.adm.toLowerCase()===adm.toLowerCase())){alert('That admission number already exists at this school.');return}all.push({id:'c_'+Date.now(),parentId:parent.id,schoolId:parent.schoolId,name,adm,class:cls,total:0,paid:0,balance:0,status:'paid',lastPayment:'—',initials:name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase(),color:'linear-gradient(135deg,#1a6dcc,#059669)'});localStorage.setItem('ff_students',JSON.stringify(all));document.getElementById('childModal').remove();init()}
function saveProfile(){const name=document.getElementById('profileName').value.trim(),phone=document.getElementById('profilePhone').value.trim(),email=document.getElementById('profileEmail').value.trim();if(!name||phone.length<9){alert('Enter a valid name and phone number.');return}const all=JSON.parse(localStorage.getItem('ff_parents')||'[]');const record=all.find(p=>p.id===parent.id);if(!record)return;record.name=name;record.phone=phone;record.email=email;localStorage.setItem('ff_parents',JSON.stringify(all));session.name=name;localStorage.setItem('ff_sessions',JSON.stringify([session]));alert('Profile updated.');init()}
function markRead(){const all=JSON.parse(localStorage.getItem('ff_notifications')||'[]');all.forEach(n=>{if(n.parentId===parent.id)n.unread=false});localStorage.setItem('ff_notifications',JSON.stringify(all));notifications.forEach(n=>n.unread=false);renderAll()}
function setTheme(mode){localStorage.setItem('ff_theme',mode);const dark=mode==='dark'||(mode==='system'&&matchMedia('(prefers-color-scheme:dark)').matches);document.body.classList.toggle('dark',dark)}

function logout(){localStorage.setItem('ff_sessions','[]');location.href='portal.html'}
document.addEventListener('DOMContentLoaded',init);
</script>
