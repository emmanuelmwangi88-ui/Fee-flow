<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeeFlow — Parent Portal</title>
  <style>
    :root {
      --navy: #0c2d57;
      --blue: #1768b2;
      --green: #059669;
      --mint: #10b981;
      --page: #f1f5f9;
      --white: #ffffff;
      --line: #e2e8f0;
      --text: #172033;
      --muted: #64748b;
      --danger: #dc2626;
      --warning: #d97706;
      --sidebar-width: 305px;
      --topbar-height: 78px;
      --radius: 16px;
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: var(--page);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
    }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      width: var(--sidebar-width);
      background: var(--white);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      z-index: 30;
    }

    .brand {
      min-height: 122px;
      padding: 28px 24px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      gap: 13px;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      color: white;
      background: linear-gradient(135deg, var(--navy), var(--green));
      display: grid;
      place-items: center;
      font-size: 24px;
      flex: 0 0 auto;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.1;
      margin-top: 3px;
    }

    .brand-tag {
      display: inline-block;
      margin-top: 8px;
      padding: 3px 9px;
      border-radius: 5px;
      color: var(--green);
      background: #ecfdf5;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .navigation {
      padding: 24px 14px;
      flex: 1;
    }

    .nav-label {
      margin: 0 10px 13px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .nav-button {
      width: 100%;
      border: 0;
      border-radius: 11px;
      background: transparent;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 12px 13px;
      margin-bottom: 4px;
      text-align: left;
      font-size: 16px;
      font-weight: 500;
    }

    .nav-button:hover {
      color: var(--text);
      background: #f8fafc;
    }

    .nav-button.active {
      color: var(--navy);
      background: #eff6ff;
      font-weight: 700;
    }

    .nav-icon {
      width: 22px;
      text-align: center;
      font-size: 18px;
    }

    .nav-count {
      margin-left: auto;
      min-width: 21px;
      height: 21px;
      padding: 0 6px;
      border-radius: 11px;
      background: var(--danger);
      color: white;
      display: none;
      place-items: center;
      font-size: 11px;
      font-weight: 800;
    }

    .nav-count.show {
      display: grid;
    }

    .sidebar-footer {
      padding: 16px;
    }

    .account-card {
      padding: 15px 14px;
      border-radius: 12px;
      background: var(--page);
      margin-bottom: 14px;
    }

    .account-name {
      font-weight: 800;
      font-size: 15px;
    }

    .account-school {
      color: var(--muted);
      font-size: 12px;
      margin-top: 7px;
    }

    .logout-button {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: white;
      color: var(--text);
      font-weight: 700;
      text-align: left;
    }

    .main-area {
      margin-left: var(--sidebar-width);
      min-width: 0;
      flex: 1;
    }

    .topbar {
      height: var(--topbar-height);
      background: var(--white);
      border-bottom: 1px solid var(--line);
      padding: 0 30px;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .breadcrumb {
      color: var(--muted);
      font-size: 14px;
    }

    .breadcrumb strong {
      color: var(--text);
    }

    .content {
      padding: 28px 30px 50px;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
      animation: fade-in 0.18s ease-out;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .page-heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
    }

    .page-title {
      font-size: 29px;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .page-description {
      color: var(--muted);
      margin-top: 6px;
      font-size: 15px;
    }

    .button {
      border: 0;
      border-radius: 10px;
      padding: 11px 17px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 700;
      font-size: 14px;
    }

    .button-primary {
      color: white;
      background: linear-gradient(135deg, var(--navy), var(--blue));
    }

    .button-success {
      color: white;
      background: linear-gradient(135deg, var(--green), var(--mint));
    }

    .button-outline {
      color: var(--text);
      background: white;
      border: 1px solid var(--line);
    }

    .button-danger {
      color: var(--danger);
      background: #fef2f2;
      border: 1px solid #fecaca;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--white);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .panel-header {
      padding: 17px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 800;
    }

    .panel-body {
      padding: 22px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 22px;
    }

    .stat-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--green));
    }

    .stat-value {
      font-size: 25px;
      font-weight: 800;
    }

    .stat-value.green {
      color: var(--green);
    }

    .stat-value.red {
      color: var(--danger);
    }

    .stat-label {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .notice {
      border: 1px solid #bfdbfe;
      border-radius: 11px;
      background: #eff6ff;
      color: #1d4ed8;
      padding: 14px 16px;
      margin-bottom: 20px;
      line-height: 1.5;
      font-size: 13px;
    }

    .child-card {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 14px;
      margin-bottom: 12px;
    }

    .child-card:last-child {
      margin-bottom: 0;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      color: white;
      background: linear-gradient(135deg, var(--blue), var(--green));
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 800;
    }

    .child-name {
      font-size: 17px;
      font-weight: 800;
    }

    .child-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .balance-block {
      text-align: right;
    }

    .balance-value {
      color: var(--green);
      font-weight: 800;
      font-size: 16px;
    }

    .balance-label {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .empty-state {
      color: var(--muted);
      text-align: center;
      padding: 42px 20px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 12px 15px;
      text-align: left;
      color: var(--muted);
      background: var(--page);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td {
      padding: 14px 15px;
      border-top: 1px solid var(--line);
      font-size: 13px;
    }

    .money {
      font-weight: 800;
    }

    .money.green {
      color: var(--green);
    }

    .pill {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 7px;
      color: var(--green);
      background: #ecfdf5;
      font-size: 11px;
      font-weight: 800;
    }

    .receipt-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 18px;
    }

    .receipt {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 22px;
      background: #fffefb;
    }

    .receipt-heading {
      text-align: center;
      padding-bottom: 15px;
      border-bottom: 3px double var(--navy);
      margin-bottom: 13px;
    }

    .receipt-school {
      color: var(--navy);
      font-size: 19px;
      font-weight: 800;
    }

    .receipt-title {
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .receipt-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 7px 0;
      border-bottom: 1px dotted var(--line);
      font-size: 13px;
    }

    .receipt-actions {
      display: flex;
      gap: 8px;
      margin-top: 15px;
    }

    .notification {
      padding: 17px 20px;
      border-bottom: 1px solid var(--line);
    }

    .notification:last-child {
      border-bottom: 0;
    }

    .notification.unread {
      background: #f0f9ff;
    }

    .notification-title {
      font-weight: 800;
    }

    .notification-message,
    .notification-time {
      color: var(--muted);
      margin-top: 5px;
      font-size: 13px;
    }

    .notification-time {
      font-size: 11px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
    }

    .form-input {
      width: 100%;
      padding: 11px 12px;
      border: 1.5px solid var(--line);
      border-radius: 9px;
      background: white;
      color: var(--text);
      outline: none;
    }

    .form-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(23, 104, 178, 0.1);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      padding: 20px;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 16px;
      background: white;
      box-shadow: 0 25px 60px rgba(15, 23, 42, 0.25);
    }

    .modal-header {
      padding: 19px 21px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 800;
    }

    .modal-body {
      padding: 21px;
    }

    .modal-footer {
      padding: 15px 21px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .mobile-menu {
      display: none;
      border: 0;
      background: transparent;
      font-size: 24px;
    }

    .access-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .access-card {
      width: 100%;
      max-width: 470px;
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: white;
      text-align: center;
    }

    @media (max-width: 900px) {
      :root {
        --sidebar-width: 270px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.2s ease;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main-area {
        margin-left: 0;
      }

      .mobile-menu {
        display: block;
        margin-right: 12px;
      }

      .content {
        padding: 22px 16px 40px;
      }

      .topbar { padding: 0 16px; }
      .desktop-status { display:none; }
      .topbar .button { padding:8px 10px !important; }

      .page-heading {
        flex-direction: column;
      }

      .child-card {
        grid-template-columns: auto 1fr;
      }

      .balance-block {
        grid-column: 2;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="modal-backdrop" id="childModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Add Child</div>
        <button class="button button-outline" onclick="closeModal('childModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="childName">Child's full name</label>
          <input class="form-input" id="childName" placeholder="Enter full name">
        </div>
        <div class="form-group">
          <label class="form-label" for="childAdm">Admission number</label>
          <input class="form-input" id="childAdm" placeholder="Enter admission number">
        </div>
        <div class="form-group">
          <label class="form-label" for="childClass">Class / grade / form</label>
          <input class="form-input" id="childClass" placeholder="Enter class or grade">
        </div>
      </div>
      <div class="modal-footer">
        <button class="button button-outline" onclick="closeModal('childModal')">Cancel</button>
        <button class="button button-primary" onclick="saveChild()">Add Child</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="paymentModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">M-Pesa STK Push</div>
        <button class="button button-outline" onclick="closeModal('paymentModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="notice" id="paybillNotice"></div>
        <div class="form-group">
          <label class="form-label" for="paymentStudent">Student</label>
          <select class="form-input" id="paymentStudent"></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="paymentAmount">Amount (KES)</label>
          <input class="form-input" id="paymentAmount" type="number" min="1">
        </div>
        <div class="form-group">
          <label class="form-label" for="paymentPhone">M-Pesa phone number</label>
          <input class="form-input" id="paymentPhone" placeholder="7XX XXX XXX">
        </div>
      </div>
      <div class="modal-footer">
        <button class="button button-outline" onclick="closeModal('paymentModal')">Cancel</button>
        <button class="button button-success" id="payButton" onclick="makePayment()">Send STK Push</button>
      </div>
    </div>
  </div>

    <script>
    let session = null;
    let parent = null;
    let school = null;
    let children = [];
    let payments = [];
    let notifications = [];

    function safeArray(key) {
      try {
        const value = JSON.parse(localStorage.getItem(key) || "[]");
        return Array.isArray(value) ? value : [];
      } catch (error) {
        return [];
      }
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, character => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[character]));
    }

    function money(value) {
      return "KES " + Number(value || 0).toLocaleString("en-KE");
    }

    // Accepts 07XXXXXXXX, 01XXXXXXXX, 7XXXXXXXX, 2547XXXXXXXX, +2547XXXXXXXX
    // Returns the normalized 2547XXXXXXXX / 2541XXXXXXXX format M-Pesa expects, or null if invalid.
    function normalizeKenyanPhone(raw) {
      const digits = String(raw || "").replace(/\D/g, "");
      if (/^254(7|1)\d{8}$/.test(digits)) return digits;
      if (/^0(7|1)\d{8}$/.test(digits)) return "254" + digits.slice(1);
      if (/^(7|1)\d{8}$/.test(digits)) return "254" + digits;
      return null;
    }

    function initialize() {
      const parents = safeArray("ff_parents");
      const schools = safeArray("ff_schools");
      const sessions = safeArray("ff_sessions");
      const existingSession = sessions.length === 1
        ? sessions.find(item => item.type === "parent" && Date.now() - Number(item.timestamp || 0) < 86400000)
        : null;

      parent = existingSession
        ? parents.find(item => item.id === existingSession.parentId && item.schoolId === existingSession.schoolId)
        : null;

      // Require a valid, current parent session. Never silently reopen an account
      // after logout or manufacture a local account.
      if (!parent) {
        localStorage.setItem("ff_sessions", "[]");
        renderSignedOutPage();
        return;
      }

      session = existingSession;

      school = schools.find(item => item.id === parent.schoolId) || {
        id: parent.schoolId,
        name: parent.schoolName || "School not assigned",
        paybill: ""
      };

      children = safeArray("ff_students").filter(item => item.parentId === parent.id);
      const childIds = new Set(children.map(item => item.id));
      payments = safeArray("ff_payments").filter(item => childIds.has(item.studentId));
      notifications = safeArray("ff_notifications").filter(item => item.parentId === parent.id);

      renderShell();
      renderAllViews();
    }

    function renderSignedOutPage() {
      document.getElementById("app").innerHTML = `
        <div class="access-page">
          <div class="access-card">
            <div style="font-size:48px">✓</div>
            <h1 style="margin-top:12px">You’re signed out</h1>
            <p class="page-description" style="margin-bottom:20px">Your FeeFlow parent session has ended securely.</p>
            <a class="button button-primary" style="text-decoration:none;width:100%" href="portal.html">Return to login</a>
          </div>
        </div>`;
    }

    function renderAccessPage(parents) {
      const accountButtons = parents.map(item => {
        const accountSchool = safeArray("ff_schools").find(value => value.id === item.schoolId);
        return `
          <button class="button button-outline" style="width:100%;margin-top:9px" onclick="enterParent('${item.id}')">
            ${escapeHtml(item.name)} — ${escapeHtml(accountSchool?.name || item.schoolName || "School")}
          </button>
        `;
      }).join("");

      document.getElementById("app").innerHTML = `
        <div class="access-page">
          <div class="access-card">
            <div style="font-size:48px">🎓</div>
            <h1 style="margin-top:12px">FeeFlow Parent Portal</h1>
            <p class="page-description" style="margin-bottom:18px">More than one parent account was found on this device. Choose which one to open.</p>
            ${accountButtons || '<div class="notice">No parent accounts have been registered.</div>'}
          </div>
        </div>
      `;
    }

    function enterParent(parentId) {
      const account = safeArray("ff_parents").find(item => item.id === parentId);
      if (!account) return;

      localStorage.setItem("ff_sessions", JSON.stringify([{
        id: "parent_" + Date.now(),
        type: "parent",
        parentId: account.id,
        schoolId: account.schoolId,
        name: account.name,
        timestamp: Date.now()
      }]));

      location.reload();
    }

    function renderShell() {
      const parents = safeArray("ff_parents");
      const switchAccountButton = parents.length > 1
        ? `<button class="logout-button" style="margin-bottom:8px" onclick="switchAccount()">⇄ Switch Account</button>`
        : "";

      document.getElementById("app").innerHTML = `
        <div class="app-shell">
          <aside class="sidebar" id="sidebar">
            <div class="brand">
              <div class="brand-mark">🎓</div>
              <div>
                <div class="brand-name">FeeFlow</div>
                <span class="brand-tag">PARENT PORTAL</span>
              </div>
            </div>

            <nav class="navigation">
              <div class="nav-label">My Account</div>
              ${navButton("dashboard", "◔", "Dashboard", true)}
              ${navButton("children", "♟", "My Children")}
              ${navButton("payments", "▤", "Payments & Receipts")}
              ${navButton("reports", "▧", "Fee Reports")}
              ${navButton("notifications", "◈", "Notifications", false, "notificationCount")}
              ${navButton("profile", "♣", "Profile")}
            </nav>

            <div class="sidebar-footer">
              <div class="account-card">
                <div class="account-name">${escapeHtml(parent.name)}</div>
                <div class="account-school">${escapeHtml(school.name || parent.schoolName || "School")}</div>
              </div>
              ${switchAccountButton}
              <button class="logout-button" onclick="requestLogout()" aria-label="Log out of FeeFlow">↪ Logout</button>
            </div>
          </aside>

          <main class="main-area">
            <header class="topbar">
              <button class="mobile-menu" onclick="toggleSidebar()">☰</button>
              <div class="breadcrumb">FeeFlow / <strong id="breadcrumb">Dashboard</strong></div>

    function normalizeGrade(value) {
      return String(value || "")
        .replace(/[A-Z]$/, "")
        .replace(/^Class /i, "Grade ")
        .trim()
        .toLowerCase();
    }

    function findPublishedGrade(publication, child) {
      for (const level of publication?.levels || []) {
        const grade = (level.grades || []).find(item => normalizeGrade(item.name) === normalizeGrade(child.class));
        if (grade) return { level: level.name, grade };
      }
      return null;
    }

    function renderFeeReports() {
      const publication = JSON.parse(localStorage.getItem("ff_fee_published_" + parent.schoolId) || "null");
      const termNames = JSON.parse(localStorage.getItem("ff_fee_term_names_" + parent.schoolId) || "null") || ["Term 1", "Term 2", "Term 3"];

      let body = "";
      if (!publication) {
        body = '<div class="panel"><div class="empty-state">Your school has not published a fee structure yet.</div></div>';
      } else if (!children.length) {
        body = '<div class="panel"><div class="empty-state">Add a child to view a matching fee report.</div></div>';
      } else {
        body = children.map(child => {
          const match = findPublishedGrade(publication, child);
          if (!match) {
            return `<div class="panel"><div class="panel-header">${escapeHtml(child.name)}</div><div class="panel-body"><div class="notice">No published fee structure matches ${escapeHtml(child.class)}. Contact the school administrator.</div>${feeBalanceCards(child)}</div></div>`;
          }

          const terms = termNames.map((term, termIndex) => {
            const rows = (match.grade.fees || []).map(fee => `
              <tr>
                <td>${escapeHtml(fee.name)}</td>
                <td>${escapeHtml(fee.category)}</td>
                <td class="money">${money(fee.amounts?.[termIndex] || 0)}</td>
              </tr>
            `).join("");
            const total = (match.grade.fees || []).reduce((sum, fee) => sum + Number(fee.amounts?.[termIndex] || 0), 0);
            return `<h3 style="margin:20px 0 8px">${escapeHtml(term)}</h3><div class="table-wrap"><table><thead><tr><th>Fee item</th><th>Category</th><th>Amount</th></tr></thead><tbody>${rows || '<tr><td colspan="3">No fee items configured.</td></tr>'}<tr><td colspan="2"><strong>Total</strong></td><td class="money"><strong>${money(total)}</strong></td></tr></tbody></table></div>`;
          }).join("");

          return `<div class="panel"><div class="panel-header"><span>${escapeHtml(child.name)} — ${escapeHtml(match.level)} / ${escapeHtml(match.grade.name)}</span><span style="font-size:12px;color:var(--muted)">Published ${publication.publishedAt ? new Date(publication.publishedAt).toLocaleDateString() : "—"}</span></div><div class="panel-body">${feeBalanceCards(child)}${terms}</div></div>`;
        }).join("");
      }

      document.getElementById("view-reports").innerHTML = `
        <div class="page-heading">
          <div>
            <h1 class="page-title">Fee Reports</h1>
            <p class="page-description">Published fee structures, amounts paid and remaining balances</p>
          </div>
        </div>
        ${body}
      `;
    }

      const selected = studentSelect.options[studentSelect.selectedIndex];

    async function makePayment() {
      const studentId = document.getElementById("paymentStudent").value;
      const amount = Number(document.getElementById("paymentAmount").value);
      const rawPhone = document.getElementById("paymentPhone").value.trim();
      const phone = normalizeKenyanPhone(rawPhone);
      const button = document.getElementById("payButton");

      if (!studentId || !amount || amount <= 0) {
        alert("Choose a student and enter a valid amount.");
        return;
      }

      if (!phone) {
        alert("Enter a valid Safaricom number, e.g. 07XX XXX XXX or 7XX XXX XXX.");
        return;
      }

      if (!school.paybill) {
        alert("The school has not configured its official M-Pesa paybill.");
        return;
      }

      if (!school.stkEndpoint) {
        alert("The school has not connected its secure STK Push endpoint.");
        return;
      }

      const student = children.find(item => item.id === studentId);
      if (!student) return;
      if (Number(student.balance) > 0 && amount > Number(student.balance)) {
        alert("The payment amount cannot exceed the remaining balance of " + money(student.balance) + ".");
        return;
      }

      button.disabled = true;
      button.textContent = "Sending…";

      try {
        const response = await fetch(school.stkEndpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            phone,
            amount,
            paybill: school.paybill,
            accountReference: student.adm,
            studentId: student.id,
            schoolId: school.id
          })
        });

        const result = await response.json().catch(() => ({}));

        if (!response.ok || result.success === false) {
          throw new Error(result.message || "STK Push request failed.");
        }

        const reference = result.reference || result.checkoutRequestId;
        if (!reference) {
          throw new Error("The payment service did not return a reference.");
        }

        recordConfirmedPayment(student, amount, phone, reference);
        closeModal("paymentModal");
        initialize();
        showView("payments");
        alert("Payment confirmed. Your receipt is ready.");
      } catch (error) {
        alert(error.message || "Unable to complete the STK Push request.");
      } finally {
        button.disabled = false;
        button.textContent = "Send STK Push";
      }
    }

    function recordConfirmedPayment(student, amount, phone, reference) {
      const students = safeArray("ff_students");
      const studentRecord = students.find(item => item.id === student.id);
      if (!studentRecord) return;

      studentRecord.paid = Number(studentRecord.paid || 0) + amount;
      studentRecord.balance = Math.max(0, Number(studentRecord.total || 0) - studentRecord.paid);
      studentRecord.status = studentRecord.balance === 0 ? "paid" : "partial";
      localStorage.setItem("ff_students", JSON.stringify(students));

      const payment = {
        id: "payment_" + Date.now(),
        ref: reference,
        studentId: studentRecord.id,
        studentName: studentRecord.name,
        class: studentRecord.class,
        amount,
        method: "M-Pesa STK",
        status: "reconciled",
        date: new Date().toLocaleString(),
        schoolId: school.id,
        schoolName: school.name,
        paybill: school.paybill,
        stkPhone: phone
      };

      const allPayments = safeArray("ff_payments");
      allPayments.unshift(payment);
      localStorage.setItem("ff_payments", JSON.stringify(allPayments));

      const allNotifications = safeArray("ff_notifications");
      allNotifications.unshift({
        id: Date.now(),
        audience: "school",
        schoolId: school.id,
        parentId: parent.id,
        studentId: studentRecord.id,
        type: "payment",
        title: "Payment Received — Receipt Ready",
        body: `${money(amount)} received for ${studentRecord.name}. Receipt ${reference} is ready.`,
        time: "Just now",
        unread: true
      });
      localStorage.setItem("ff_notifications", JSON.stringify(allNotifications));
    }

    function downloadAllReceipts() {
      const blob = new Blob([receiptsHtml(payments)], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `FeeFlow-Receipts-${Date.now()}.html`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function printReceipt(paymentId) {
      const payment = payments.find(item => item.id === paymentId);
      if (!payment) return;

      const printWindow = window.open("", "_blank", "width=760,height=820");
      printWindow.document.write(receiptHtml(payment));
      printWindow.document.close();
      printWindow.focus();
      printWindow.print();
    }

    function downloadReceipt(paymentId) {
      const payment = payments.find(item => item.id === paymentId);
      if (!payment) return;

      const blob = new Blob([receiptHtml(payment)], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `FeeFlow-Receipt-${payment.ref || payment.id}.html`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function markNotificationRead(notificationId) {
      const allNotifications = safeArray("ff_notifications");
      const record = allNotifications.find(item => String(item.id) === String(notificationId));
      if (record && record.parentId === parent.id) record.unread = false;
      localStorage.setItem("ff_notifications", JSON.stringify(allNotifications));
      notifications = allNotifications.filter(item => item.parentId === parent.id);
      renderNotifications();
      updateNotificationBadge();
    }

    function markAllRead() {
      const allNotifications = safeArray("ff_notifications");
      allNotifications.forEach(item => {
        if (item.parentId === parent.id) item.unread = false;
      });
      localStorage.setItem("ff_notifications", JSON.stringify(allNotifications));
      notifications.forEach(item => item.unread = false);
      renderNotifications();
      updateNotificationBadge();
    }

    function saveProfile() {
      const name = document.getElementById("profileName").value.trim();
      const rawPhone = document.getElementById("profilePhone").value.trim();
      const email = document.getElementById("profileEmail").value.trim();
      const phone = normalizeKenyanPhone(rawPhone);

      if (!name) {
        alert("Enter your full name.");
        return;
      }
      if (!phone) {
        alert("Enter a valid Safaricom number, e.g. 07XX XXX XXX or 7XX XXX XXX.");
        return;
      }
      if (!/^\S+@\S+\.\S+$/.test(email)) {
        alert("Enter a valid email address.");
        return;
      }

      const parents = safeArray("ff_parents");
      if (parents.some(item => item.id !== parent.id && String(item.email || "").toLowerCase() === email.toLowerCase())) {
        alert("That email address is already used by another parent account.");
        return;
      }
      const parentRecord = parents.find(item => item.id === parent.id);
      if (!parentRecord) return;

      parentRecord.name = name;
      parentRecord.phone = phone;
      parentRecord.email = email;
      localStorage.setItem("ff_parents", JSON.stringify(parents));

      session.name = name;
      localStorage.setItem("ff_sessions", JSON.stringify([session]));
      initialize();
      showView("profile");
      alert("Profile updated successfully.");
    }

      document.querySelectorAll(".modal-backdrop").forEach(backdrop => {
        backdrop.addEventListener("click", event => {
          if (event.target === backdrop) backdrop.classList.remove("open");
        });
      });
    });

    window.addEventListener("error", event => {
      console.error(event.error || event.message);
      if (!document.querySelector(".app-shell") && !document.querySelector(".access-page")) {
        document.getElementById("app").innerHTML = `
          <div class="access-page">
            <div class="access-card">
              <h2>Unable to load Parent Portal</h2>
              <p class="page-description">${escapeHtml(event.message || "An unexpected error occurred.")}</p>
              <button class="button button-outline" onclick="resetParentPortalData()">Repair Local Session</button>
              <a class="button button-primary" style="margin-top:10px;text-decoration:none" href="parent.html">Reload Dashboard</a>
            </div>
          </div>
        `;
      }
    });

    function bootParentPortal() {
      try {
        initialize();
      } catch (error) {
        console.error(error);
        const app = document.getElementById("app");
        if (!app) return;
        app.innerHTML = `
          <div class="access-page">
            <div class="access-card">
              <h2>Unable to load Parent Portal</h2>
              <p class="page-description">${escapeHtml(error.message || "An unexpected error occurred.")}</p>
              <button class="button button-outline" onclick="resetParentPortalData()">Repair Local Session</button>
              <a class="button button-primary" style="margin-top:10px;text-decoration:none" href="parent.html">Reload Dashboard</a>
            </div>
          </div>
        `;
      }
    }

    function resetParentPortalData() {
      localStorage.setItem("ff_sessions", "[]");
      window.location.replace("portal.html");
    }

    bootParentPortal();
  </script>
</body>
</html>
